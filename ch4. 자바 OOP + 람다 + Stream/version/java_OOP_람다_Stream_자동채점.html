<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java OOP &amp; 람다·Stream 자동채점</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15120D;
    --surface:#1E1912;
    --surface2:#241D15;
    --code-bg:#0F0D09;
    --border:#332B20;
    --border-soft:#2A2318;
    --accent:#D98C3D;
    --accent-soft:#E8A552;
    --success:#6FD9A0;
    --fail:#E2604F;
    --text:#F3ECDD;
    --muted:#9C9284;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    --display:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--body);
    min-height:100vh;
  }
  #app{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  /* ---------- topbar ---------- */
  .topbar{
    display:flex;justify-content:space-between;align-items:flex-end;
    gap:20px;flex-wrap:wrap;margin-bottom:22px;
  }
  .brand-eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    color:var(--accent-soft);text-transform:uppercase;margin-bottom:6px;
  }
  .brand-title{
    font-family:var(--display);font-weight:700;font-size:28px;
    letter-spacing:-0.01em;margin:0;
  }
  .brand-sub{color:var(--muted);font-size:13px;margin-top:4px;}
  .top-stats{display:flex;align-items:center;gap:14px;}
  .progress-wrap{min-width:220px;}
  .progress-label{
    display:flex;justify-content:space-between;font-family:var(--mono);
    font-size:12px;color:var(--muted);margin-bottom:6px;
  }
  .progress-label b{color:var(--text);font-weight:600;}
  .progress-track{
    height:8px;border-radius:99px;background:var(--surface2);
    border:1px solid var(--border);overflow:hidden;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-soft));
    transition:width .3s ease;
  }
  .reset-btn{
    font-family:var(--mono);font-size:12px;color:var(--muted);
    background:transparent;border:1px solid var(--border);border-radius:8px;
    padding:8px 12px;cursor:pointer;transition:.15s;
  }
  .reset-btn:hover{border-color:var(--fail);color:var(--fail);}

  /* ---------- layout ---------- */
  .layout{display:grid;grid-template-columns:230px 1fr;gap:18px;}
  @media(max-width:760px){.layout{grid-template-columns:1fr;}}

  .sidebar{display:flex;flex-direction:column;gap:14px;}
  .level-tabs{display:flex;flex-direction:column;gap:6px;}
  @media(max-width:760px){.level-tabs{flex-direction:row;overflow-x:auto;padding-bottom:4px;}}
  .level-tab{
    text-align:left;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--text);
    font-family:var(--body);transition:.15s;
  }
  @media(max-width:760px){.level-tab{flex:0 0 auto;min-width:150px;}}
  .level-tab:hover{border-color:var(--accent-soft);}
  .level-tab.active{border-color:var(--accent);background:var(--surface2);}
  .level-tab .lt-name{font-weight:600;font-size:13px;}
  .level-tab .lt-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .level-tab .lt-count{
    font-family:var(--mono);font-size:11px;color:var(--accent-soft);margin-top:6px;
  }

  .dot-grid{
    display:grid;grid-template-columns:repeat(6,1fr);gap:6px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;
  }
  @media(max-width:760px){.dot-grid{grid-template-columns:repeat(10,1fr);}}
  .dot{
    aspect-ratio:1;border-radius:6px;border:1px solid var(--border);
    background:var(--surface2);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer;transition:.15s;
  }
  .dot:hover{border-color:var(--accent-soft);}
  .dot.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .dot.pass{background:rgba(111,217,160,.14);border-color:var(--success);color:var(--success);}
  .dot.fail{background:rgba(226,96,79,.14);border-color:var(--fail);color:var(--fail);}
  .dot.bookmarked{outline:2px solid var(--accent-soft);outline-offset:1px;}

  .kbd-hint{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;}
  .kbd-hint kbd{
    background:var(--surface2);border:1px solid var(--border);border-radius:4px;
    padding:1px 5px;font-family:var(--mono);font-size:10.5px;color:var(--text);
  }

  /* ---------- question card ---------- */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:22px 24px;display:flex;flex-direction:column;gap:14px;
  }
  .card-eyebrow{
    font-family:var(--mono);font-size:11px;color:var(--accent-soft);
    letter-spacing:.08em;text-transform:uppercase;
  }
  .card-title{font-family:var(--display);font-size:21px;font-weight:600;margin:0;}
  .concept{
    background:var(--surface2);border-left:3px solid var(--accent);
    border-radius:0 8px 8px 0;padding:10px 14px;font-size:13.5px;line-height:1.6;color:var(--text);
  }
  .concept b{color:var(--accent-soft);}

  .codebox{
    background:var(--code-bg);border:1px solid var(--border-soft);border-radius:10px;
    padding:14px 16px;font-family:var(--mono);font-size:13.5px;line-height:1.7;
  }
  .cl{white-space:pre-wrap;color:var(--text);}
  .cl.muted{color:var(--muted);}
  .blank{
    width:100%;resize:vertical;background:#191309;border:1px dashed var(--accent-soft);
    border-radius:6px;color:var(--accent-soft);font-family:var(--mono);font-size:13.5px;
    padding:8px 10px;margin:4px 0;outline:none;
  }
  .blank:focus{border-style:solid;border-color:var(--accent);}
  .expected{
    font-family:var(--mono);font-size:12.5px;color:var(--muted);
  }
  .expected code{color:var(--accent-soft);background:none;}

  .actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .btn{
    font-family:var(--body);font-weight:600;font-size:13px;border-radius:8px;
    padding:9px 16px;cursor:pointer;border:1px solid var(--border);transition:.15s;
  }
  .btn-grade{background:var(--accent);border-color:var(--accent);color:#191309;}
  .btn-grade:hover{background:var(--accent-soft);}
  .btn-ghost{background:transparent;color:var(--muted);}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent-soft);}
  .btn-nav{background:var(--surface2);color:var(--text);}
  .btn-nav:hover{border-color:var(--accent-soft);}
  .btn-nav:disabled{opacity:.35;cursor:not-allowed;}

  .feedback{
    font-family:var(--mono);font-size:13px;border-radius:8px;padding:9px 12px;display:none;
  }
  .feedback.show{display:block;}
  .feedback.pass{background:rgba(111,217,160,.12);color:var(--success);border:1px solid rgba(111,217,160,.3);}
  .feedback.fail{background:rgba(226,96,79,.12);color:var(--fail);border:1px solid rgba(226,96,79,.3);}

  .answer-box{
    display:none;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;
  }
  .answer-box.show{display:block;}
  .answer-box .lbl{font-family:var(--mono);font-size:11px;color:var(--accent-soft);margin-bottom:8px;letter-spacing:.06em;}
  .answer-box .al{font-family:var(--mono);font-size:13.5px;color:var(--text);white-space:pre-wrap;}
  .answer-box .note{margin-top:10px;font-size:13px;color:var(--muted);line-height:1.6;}

  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
  .nav-row .pos{font-family:var(--mono);font-size:12px;color:var(--muted);}

  /* ---------- terminal log ---------- */
  .terminal{
    margin-top:20px;background:var(--code-bg);border:1px solid var(--border-soft);
    border-radius:12px;overflow:hidden;
  }
  .terminal-head{
    display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface2);
    border-bottom:1px solid var(--border-soft);font-family:var(--mono);font-size:11.5px;color:var(--muted);
  }
  .terminal-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
  .terminal-body{
    height:150px;overflow-y:auto;padding:12px 14px;font-family:var(--mono);
    font-size:12.5px;line-height:1.7;color:var(--muted);
  }
  .terminal-body .ln{white-space:pre-wrap;}
  .terminal-body .ln.pass{color:var(--success);}
  .terminal-body .ln.fail{color:var(--fail);}
  .terminal-body .ln.cmd{color:var(--accent-soft);}
  .cursor{display:inline-block;width:7px;height:13px;background:var(--accent-soft);
    animation:blink 1s steps(1) infinite;vertical-align:-2px;}
  @keyframes blink{50%{opacity:0;}}

  .loading{padding:60px 0;text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px;}
</style>
</head>
<body>
<div id="app"><div class="loading">진행 상황 불러오는 중...</div></div>

<script>
(function(){

  /* ============ 데이터 ============ */
  var LEVELS = [
    {id:0, name:'1장 클래스와 객체', sub:'생성자 · 필드 · 메서드 · static'},
    {id:1, name:'2장 상속', sub:'extends · super · 오버라이딩 · 다형성'},
    {id:2, name:'3장 인터페이스', sub:'implements · default · Comparable'},
    {id:3, name:'4장 추상화 · 캡슐화', sub:'private/getter·setter · equals · toString'},
    {id:4, name:'5장 람다 표현식', sub:'함수형 인터페이스 · 메서드 레퍼런스'},
    {id:5, name:'6장 Stream API 기초', sub:'filter · map · collect · reduce'},
    {id:6, name:'7장 변형 연습', sub:'같은 패턴, 다른 데이터로 반복'}
  ];

  var QUESTIONS = [
    /* ---------------- 1장 클래스와 객체 ---------------- */
    {id:'CL1', level:0, title:'생성자(Constructor) 정의',
     concept:'생성자는 객체가 생성될 때 자동으로 호출되는, 클래스와 이름이 같은 특수한 메서드입니다. 반환 타입을 적지 않습니다.',
     before:['class Person {','    String name;','    int age;'],
     placeholder:['    // TODO: name과 age를 매개변수로 받아 필드를 초기화하는 생성자 작성'], rows:4,
     after:['}','Person p = new Person("철수", 20);','System.out.println(p.name + " " + p.age);'],
     expected:'철수 20',
     answer:['    Person(String name, int age) {','        this.name = name;','        this.age = age;','    }'],
     note:'this.name은 필드, name은 매개변수입니다. 이름이 같을 때 this를 안 붙이면 매개변수가 자기 자신에게 대입되어 필드는 그대로 null로 남습니다.',
     regex:[/Person\s*\(\s*String\s+name\s*,\s*int\s+age\s*\)/, /this\.name\s*=\s*name/, /this\.age\s*=\s*age/]},

    {id:'CL2', level:0, title:'값을 반환하는 메서드',
     concept:'메서드는 클래스 안에 정의된 함수입니다. 반환 타입, 메서드 이름, 매개변수, return문으로 구성됩니다.',
     before:['class Rectangle {','    int width, height;','    Rectangle(int width, int height) { this.width = width; this.height = height; }'],
     placeholder:['    // TODO: 넓이(width*height)를 반환하는 area() 메서드 작성'], rows:3,
     after:['}','Rectangle r = new Rectangle(3, 4);','System.out.println(r.area());'],
     expected:'12',
     answer:['    int area() {','        return width * height;','    }'], note:'',
     regex:[/int\s+area\s*\(\s*\)\s*\{/, /return\s+width\s*\*\s*height/]},

    {id:'CL3', level:0, title:'생성자 오버로딩',
     concept:'생성자를 하나라도 직접 정의하면, 자바가 자동으로 제공하던 매개변수 없는 기본 생성자는 더 이상 제공되지 않습니다. 매개변수 없는 생성자도 필요하다면 직접 추가해야 합니다.',
     before:['class Box {','    int size;','    Box(int size) { this.size = size; }'],
     placeholder:['    // TODO: 매개변수 없이 size를 0으로 초기화하는 생성자(오버로딩) 추가'], rows:3,
     after:['}','Box b = new Box();','System.out.println(b.size);'],
     expected:'0',
     answer:['    Box() {','        this.size = 0;','    }'],
     note:'한 클래스에 매개변수 개수나 타입이 다른 생성자를 여러 개 두는 것을 생성자 오버로딩이라고 합니다.',
     regex:[/Box\s*\(\s*\)\s*\{/, /this\.size\s*=\s*0/]},

    {id:'CL4', level:0, title:'this()로 생성자끼리 호출',
     concept:'한 생성자 안에서 같은 클래스의 다른 생성자를 호출할 수 있습니다. this(...)를 쓰면 되는데, 반드시 생성자의 첫 줄에서만 호출할 수 있습니다.',
     before:['class Point {','    int x, y;','    Point(int x, int y) { this.x = x; this.y = y; }'],
     placeholder:['    // TODO: 매개변수 없는 생성자에서 this(0, 0)을 호출하도록 작성'], rows:3,
     after:['}','Point p = new Point();','System.out.println(p.x + "," + p.y);'],
     expected:'0,0',
     answer:['    Point() {','        this(0, 0);','    }'], note:'',
     regex:[/Point\s*\(\s*\)\s*\{/, /this\s*\(\s*0\s*,\s*0\s*\)/]},

    {id:'CL5', level:0, title:'static 필드 — 모든 인스턴스가 공유',
     concept:'static이 붙은 필드는 인스턴스마다 따로 갖는 게 아니라, 클래스 전체에서 단 하나만 존재해서 모든 객체가 공유합니다. 객체를 만들 때마다 값을 누적하고 싶을 때 자주 씁니다.',
     before:['class Counter {','    static int count = 0;','    Counter() {'],
     placeholder:['        // TODO: 객체가 생성될 때마다 count를 1 증가'],
     after:['    }','}','new Counter(); new Counter(); new Counter();','System.out.println(Counter.count);'],
     expected:'3',
     answer:['        count++;'],
     note:'static 필드는 클래스 이름(Counter.count)으로 직접 접근할 수 있습니다.',
     regex:[/count\+\+|count\s*=\s*count\s*\+\s*1/]},

    {id:'CL6', level:0, title:'객체 배열 채우기',
     concept:'객체 타입 배열을 선언하면, 각 칸은 처음에는 객체가 아니라 null로 채워집니다. new로 배열 공간을 만든 뒤, 각 칸마다 따로 객체를 생성해서 넣어야 합니다.',
     before:['class Person {','    String name;','    Person(String name) { this.name = name; }','}','Person[] people = new Person[2];'],
     placeholder:['// TODO','// (0번 칸에 "철수", 1번 칸에 "영희" 객체를 생성해서 넣기)'], rows:3,
     after:['System.out.println(people[0].name + ", " + people[1].name);'],
     expected:'철수, 영희',
     answer:['people[0] = new Person("철수");','people[1] = new Person("영희");'], note:'',
     regex:[/people\[\s*0\s*\]\s*=\s*new\s*Person\s*\(\s*"철수"\s*\)/, /people\[\s*1\s*\]\s*=\s*new\s*Person\s*\(\s*"영희"\s*\)/]},

    /* ---------------- 2장 상속 ---------------- */
    {id:'IH1', level:1, title:'extends로 상속',
     concept:'한 클래스가 다른 클래스의 필드와 메서드를 물려받게 하려면 extends를 씁니다. 부모(상위) 클래스의 멤버를 자식(하위) 클래스에서도 그대로 쓸 수 있습니다.',
     before:['class Animal {','    String name = "동물";','    void sound() { System.out.println("소리"); }','}'],
     placeholder:['// TODO: Animal을 상속받는 Dog 클래스 선언 (빈 클래스)'],
     after:['Dog d = new Dog();','System.out.println(d.name);','d.sound();'],
     expected:'동물, 소리',
     answer:['class Dog extends Animal {','}'], note:'',
     regex:[/class\s+Dog\s+extends\s+Animal/]},

    {id:'IH2', level:1, title:'super()로 부모 생성자 호출',
     concept:'자식 클래스의 생성자는 항상 부모 클래스의 생성자를 먼저 실행합니다. 부모 생성자에 인자를 넘기고 싶다면 super(...)를 직접 호출해야 하고, 반드시 생성자의 첫 줄이어야 합니다.',
     before:['class Animal {','    String name;','    Animal(String name) { this.name = name; }','}','class Dog extends Animal {'],
     placeholder:['    // TODO: Dog(String name) 생성자에서 super(name) 호출'], rows:3,
     after:['}','Dog d = new Dog("바둑이");','System.out.println(d.name);'],
     expected:'바둑이',
     answer:['    Dog(String name) {','        super(name);','    }'], note:'',
     regex:[/Dog\s*\(\s*String\s+name\s*\)\s*\{/, /super\s*\(\s*name\s*\)/]},

    {id:'IH3', level:1, title:'메서드 오버라이딩',
     concept:'자식 클래스에서 부모와 같은 시그니처(이름·매개변수)의 메서드를 다시 정의하면, 부모의 동작을 덮어씁니다(오버라이딩). @Override 애너테이션은 필수는 아니지만 붙이는 게 관례입니다.',
     before:['class Animal {','    void sound() { System.out.println("동물 소리"); }','}','class Cat extends Animal {'],
     placeholder:['    // TODO: sound()를 오버라이딩해서 "야옹" 출력'], rows:4,
     after:['}','Animal a = new Cat();','a.sound();'],
     expected:'야옹',
     answer:['    @Override','    void sound() {','        System.out.println("야옹");','    }'],
     note:'Animal 타입 변수에 Cat 객체를 담아도(다형성), 실제 호출되는 건 Cat의 sound()입니다 — 이를 동적 바인딩(dynamic binding)이라 합니다.',
     regex:[/void\s+sound\s*\(\s*\)\s*\{/, /야옹/]},

    {id:'IH4', level:1, title:'super.method()로 부모 메서드 호출',
     concept:'오버라이딩한 메서드 안에서도 부모의 원래 동작을 호출하고 싶을 때가 있습니다. super.메서드명()으로 부모 버전을 명시적으로 호출할 수 있습니다.',
     before:['class Animal {','    void sound() { System.out.println("동물 소리"); }','}','class Cat extends Animal {','    @Override','    void sound() {'],
     placeholder:['        // TODO: 부모의 sound()를 먼저 호출'],
     after:['        System.out.println("야옹");','    }','}','new Cat().sound();'],
     expected:'동물 소리, 야옹',
     answer:['        super.sound();'], note:'',
     regex:[/super\.sound\s*\(\s*\)/]},

    {id:'IH5', level:1, title:'instanceof로 타입 확인',
     concept:'다형적 참조 변수가 실제로 어떤 타입의 객체를 가리키고 있는지 확인하고 싶을 때 instanceof 연산자를 씁니다. 결과는 true/false입니다.',

     before:['interface Flyable {','    void fly();','}','class Bird implements Flyable {'],

     regex:[/public\s+void\s+fly\s*\(\s*\)\s*\{/, /날아간다/]},

     concept:'추상 클래스(abstract class)는 인터페이스와 달리 일반 필드와 생성자, 구현이 있는 일반 메서드를 가질 수 있습니다. abstract 메서드는 본문 없이 선언만 하고, 자식 클래스가 반드시 구현해야 합니다.',

     regex:[/double\s+area\s*\(\s*\)\s*\{/, /return\s+side\s*\*\s*side/]},

    {id:'IF6', level:2, title:'Comparable로 자연 순서 정의',
     concept:'Comparable<T> 인터페이스를 구현하면 객체끼리 기본적으로 어떤 순서로 비교되어야 하는지를 직접 정의할 수 있습니다. compareTo()가 음수면 자신이 앞, 양수면 상대가 앞입니다. 한 번 구현해두면 별도 비교자 없이도 정렬이 가능해집니다.',
     before:['class Person implements Comparable<Person> {','    String name; int age;','    Person(String name, int age) { this.name = name; this.age = age; }'],
     placeholder:['    // TODO: age 기준 오름차순으로 비교하는 compareTo() 구현'], rows:3,
     after:['}','List<Person> people = new ArrayList<>(Arrays.asList(new Person("A", 30), new Person("B", 20)));','Collections.sort(people);','System.out.println(people.get(0).name);'],
     expected:'B',
     answer:['    public int compareTo(Person other) {','        return this.age - other.age;','    }'], note:'',
     regex:[/public\s+int\s+compareTo\s*\(\s*Person\s+\w+\s*\)/, /this\.age\s*-\s*\w+\.age|Integer\.compare\s*\(\s*this\.age\s*,\s*\w+\.age\s*\)/]},

    {id:'AC3', level:3, title:'static 메서드',

  /* ============ 상태 ============ */
  var state = {
    loaded:false,
    progress:{},      // {qid: {status:'pass'|'fail', input:'...'}}
    inputs:{},         // 임시 입력값 (세션 내, qid별)
    revealed:{},        // qid -> bool
    bookmarks:{},        // qid -> bool, 즐겨찾기한 문제
    level:0,
    index:0,
    log:[],
    reviewMode:false,   // true면 레벨 무시하고 '틀린 문제'만 모아서 보여줌
    bookmarkMode:false  // true면 레벨 무시하고 '즐겨찾기한 문제'만 모아서 보여줌
  };

  var STORAGE_KEY = 'ds_quiz_progress_v4_oop_lambda_stream';
  var BOOKMARK_KEY = 'ds_quiz_bookmarks_v4_oop_lambda_stream';

  function esc(s){
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  function questionsOfLevel(lv){
    return QUESTIONS.filter(function(q){return q.level===lv;});
  }

  function failedQuestions(){
    return QUESTIONS.filter(function(q){
      return state.progress[q.id] && state.progress[q.id].status==='fail';
    });
  }

  function bookmarkedQuestions(){
    return QUESTIONS.filter(function(q){ return !!state.bookmarks[q.id]; });
  }

  function activeQuestionList(){
    if(state.reviewMode) return failedQuestions();
    if(state.bookmarkMode) return bookmarkedQuestions();
    return questionsOfLevel(state.level);
  }

  function totalPassed(){
    var n=0;
    Object.keys(state.progress).forEach(function(k){
      if(state.progress[k] && state.progress[k].status==='pass') n++;
    });
    return n;
  }

  function levelPassed(lv){
    var n=0;
    questionsOfLevel(lv).forEach(function(q){
      if(state.progress[q.id] && state.progress[q.id].status==='pass') n++;
    });
    return n;
  }

  /* ============ 저장소 ============ */
  async function loadProgress(){
    try{
      var res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        var parsed = JSON.parse(res.value);
        state.progress = parsed || {};
      }
    }catch(e){
      state.progress = {};

    try{
      var bres = await window.storage.get(BOOKMARK_KEY, false);
      if(bres && bres.value){

        state.bookmarks = bparsed || {};
      }
    }catch(e){
      state.bookmarks = {};
    }
    state.loaded = true;

  /* ============ 채점 ============ */
  function gradeQuestion(q, input){
    return q.regex.every(function(r){ return r.test(input); });
  }

  function pushLog(qid, pass){
    state.log.push({cmd:'check '+qid, pass:pass});

  /* ============ 에디터 보조 기능 (괄호 자동완성 · 탭 들여쓰기) ============ */
  var BRACKET_OPEN_CLOSE = {'(':')', '[':']', '{':'}'};
  var BRACKET_CLOSE_CHARS = {')':true, ']':true, '}':true};
  var INDENT_UNIT = '    '; // 4칸

  function lineBoundsOf(value, start, end){
    var lineStart = value.lastIndexOf('\n', start-1) + 1;
    var lineEnd = value.indexOf('\n', end);
    if(lineEnd === -1) lineEnd = value.length;
    return {lineStart: lineStart, lineEnd: lineEnd};
  }

  function indentSelection(ta, q){
    var value = ta.value;
    var start = ta.selectionStart, end = ta.selectionEnd;
    if(start === end){
      ta.value = value.slice(0, start) + INDENT_UNIT + value.slice(start);
      ta.selectionStart = ta.selectionEnd = start + INDENT_UNIT.length;
      state.inputs[q.id] = ta.value;
      return;
    }
    var b = lineBoundsOf(value, start, end);
    var lines = value.slice(b.lineStart, b.lineEnd).split('\n');
    var indented = lines.map(function(l){ return INDENT_UNIT + l; }).join('\n');
    ta.value = value.slice(0, b.lineStart) + indented + value.slice(b.lineEnd);
    ta.selectionStart = start + INDENT_UNIT.length;
    ta.selectionEnd = end + INDENT_UNIT.length * lines.length;
    state.inputs[q.id] = ta.value;
  }

  function outdentSelection(ta, q){
    var value = ta.value;
    var start = ta.selectionStart, end = ta.selectionEnd;
    var b = lineBoundsOf(value, start, end);
    var lines = value.slice(b.lineStart, b.lineEnd).split('\n');
    var removed = [];
    var outdented = lines.map(function(l){
      var m = l.match(/^( {1,4}|\t)/);
      var n = m ? m[0].length : 0;
      removed.push(n);
      return l.slice(n);
    }).join('\n');
    ta.value = value.slice(0, b.lineStart) + outdented + value.slice(b.lineEnd);
    var firstRemoved = removed[0] || 0;
    var totalRemoved = removed.reduce(function(a,c){return a+c;}, 0);
    ta.selectionStart = Math.max(b.lineStart, start - firstRemoved);
    ta.selectionEnd = Math.max(ta.selectionStart, end - totalRemoved);
    state.inputs[q.id] = ta.value;
  }

  function autoIndentNewline(ta, q){
    var value = ta.value;
    var pos = ta.selectionStart;
    var lineStart = value.lastIndexOf('\n', pos-1) + 1;
    var currentLine = value.slice(lineStart, pos);
    var indentMatch = currentLine.match(/^[ \t]*/);
    var indent = indentMatch ? indentMatch[0] : '';
    var lastNonSpace = value.slice(0, pos).replace(/\s+$/, '').slice(-1);
    var extra = (lastNonSpace === '{') ? INDENT_UNIT : '';
    var insertText = '\n' + indent + extra;
    ta.value = value.slice(0, pos) + insertText + value.slice(pos);
    var newPos = pos + insertText.length;
    ta.selectionStart = ta.selectionEnd = newPos;
    state.inputs[q.id] = ta.value;
  }

  function handleBracketKeydown(e, ta, q){
    var key = e.key;
    if(e.ctrlKey || e.metaKey || e.altKey) return false;

    if(BRACKET_OPEN_CLOSE[key]){
      var start = ta.selectionStart, end = ta.selectionEnd;
      var value = ta.value;
      var close = BRACKET_OPEN_CLOSE[key];
      if(start !== end){
        var selected = value.slice(start, end);
        ta.value = value.slice(0, start) + key + selected + close + value.slice(end);
        ta.selectionStart = start + 1;
        ta.selectionEnd = end + 1;
      }else{
        ta.value = value.slice(0, start) + key + close + value.slice(start);
        ta.selectionStart = ta.selectionEnd = start + 1;
      }
      state.inputs[q.id] = ta.value;
      e.preventDefault();
      return true;
    }

    if(BRACKET_CLOSE_CHARS[key]){
      var pos = ta.selectionStart;
      if(ta.selectionStart === ta.selectionEnd && ta.value[pos] === key){
        ta.selectionStart = ta.selectionEnd = pos + 1;
        e.preventDefault();
        return true;
      }
      return false;
    }

    if(key === 'Backspace'){
      var s = ta.selectionStart, en = ta.selectionEnd;
      if(s === en && s > 0){
        var prevChar = ta.value[s-1];
        var nextChar = ta.value[s];
        if(BRACKET_OPEN_CLOSE[prevChar] && BRACKET_OPEN_CLOSE[prevChar] === nextChar){
          ta.value = ta.value.slice(0, s-1) + ta.value.slice(s+1);
          ta.selectionStart = ta.selectionEnd = s-1;
          state.inputs[q.id] = ta.value;
          e.preventDefault();
          return true;
        }
      }
      return false;
    }

    return false;
  }

  function handleEditorKeydown(e, ta, q){
    if(e.key === 'Tab' && !e.ctrlKey && !e.altKey && !e.metaKey){
      e.preventDefault();
      if(e.shiftKey) outdentSelection(ta, q); else indentSelection(ta, q);
      return;
    }
    if(e.key === 'Enter' && !e.ctrlKey && !e.metaKey){
      e.preventDefault();
      autoIndentNewline(ta, q);
      return;
    }
    handleBracketKeydown(e, ta, q);
  }

  /* ============ 렌더링 ============ */
  function renderEmptySpecial(){
    var app = document.getElementById('app');
    var passed = totalPassed();
    var isBookmark = state.bookmarkMode;
    var title = isBookmark ? '🔖 아직 즐겨찾기한 문제가 없습니다' : '🎉 지금은 틀린 문제가 없습니다';
    var html = '';
    html += '<div class="topbar">';
    html += '  <div>';
    html += '    <div class="brand-eyebrow">$ run --suite java-oop-lambda-stream</div>';
    html += '    <h1 class="brand-title">OOP &amp; 람다·Stream 자동채점</h1>';
    html += '  </div>';
    html += '  <div class="top-stats"><button class="reset-btn" data-action="reset">진행 초기화</button></div>';
    html += '</div>';
    html += '<div class="card" style="text-align:center;padding:50px 24px;">';
    html += '  <div class="card-title">'+title+'</div>';
    html += '  <p style="color:var(--muted);font-size:13.5px;margin:10px 0 18px;">전체 진행: '+passed+' / '+QUESTIONS.length+'</p>';
    html += '  <button class="btn btn-grade" data-action="exit-review">전체 문제로 돌아가기</button>';
    html += '</div>';
    app.innerHTML = html;
  }

  function render(){
    var app = document.getElementById('app');
    if(!state.loaded){
      app.innerHTML = '<div class="loading">진행 상황 불러오는 중...</div>';
      return;
    }
    var levelQs = activeQuestionList();
    if((state.reviewMode || state.bookmarkMode) && levelQs.length===0){
      renderEmptySpecial();
      return;
    }
    if(state.index >= levelQs.length) state.index = 0;
    var q = levelQs[state.index];
    var passed = totalPassed();

    var html = '';

    /* topbar */
    html += '<div class="topbar">';
    html += '  <div>';
    html += '    <div class="brand-eyebrow">$ run --suite java-oop-lambda-stream</div>';
    html += '    <h1 class="brand-title">OOP &amp; 람다·Stream 자동채점</h1>';
    html += '    <div class="brand-sub">코드를 입력하고 채점하면, 정규식으로 문법을 검증합니다 (실제 자바 실행 X).</div>';
    html += '    <div class="kbd-hint"><kbd>Ctrl/Cmd</kbd>+<kbd>Enter</kbd> 채점 · <kbd>←</kbd><kbd>→</kbd> 이전/다음 문제 · <kbd>R</kbd> 정답 보기 · <kbd>Esc</kbd> 입력창 빠져나오기 · <kbd>Enter</kbd> 입력창 포커스</div>';
    html += '  </div>';
    html += '  <div class="top-stats">';
    html += '    <div class="progress-wrap">';
    html += '      <div class="progress-label"><span>전체 진행</span><b>'+passed+' / '+QUESTIONS.length+'</b></div>';
    html += '      <div class="progress-track"><div class="progress-fill" style="width:'+Math.round(passed/QUESTIONS.length*100)+'%"></div></div>';
    html += '    </div>';
    html += '    <button class="reset-btn" data-action="reset">진행 초기화</button>';
    html += '  </div>';
    html += '</div>';

    html += '<div class="layout">';

    /* sidebar */
    html += '  <div class="sidebar">';
    var failCount = failedQuestions().length;
    var bookmarkCount = Object.keys(state.bookmarks).filter(function(k){return state.bookmarks[k];}).length;
    html += '    <button class="level-tab" data-action="toggle-review" style="border-color:'+(state.reviewMode?'var(--accent)':'var(--border)')+';background:'+(state.reviewMode?'var(--surface2)':'var(--surface)')+';">';
    html += '      <div class="lt-name">📌 오답 노트</div>';
    html += '      <div class="lt-sub">'+(state.reviewMode?'복습 모드 진행 중':'틀린 문제만 모아 다시 풀기')+'</div>';
    html += '      <div class="lt-count">'+failCount+'개 대기 중</div>';
    html += '    </button>';
    html += '    <button class="level-tab" data-action="toggle-bookmark-mode" style="border-color:'+(state.bookmarkMode?'var(--accent)':'var(--border)')+';background:'+(state.bookmarkMode?'var(--surface2)':'var(--surface)')+';">';
    html += '      <div class="lt-name">🔖 즐겨찾기</div>';
    html += '      <div class="lt-sub">'+(state.bookmarkMode?'즐겨찾기 모드 진행 중':'북마크한 문제만 모아 보기')+'</div>';
    html += '      <div class="lt-count">'+bookmarkCount+'개 저장됨</div>';
    html += '    </button>';
    html += '    <div class="level-tabs">';
    LEVELS.forEach(function(lv){
      var qs = questionsOfLevel(lv.id);
      var p = levelPassed(lv.id);
      html += '<div class="level-tab'+((!state.reviewMode && !state.bookmarkMode && state.level===lv.id)?' active':'')+'" data-action="select-level" data-level="'+lv.id+'">';
      html += '  <div class="lt-name">'+esc(lv.name)+'</div>';
      html += '  <div class="lt-sub">'+esc(lv.sub)+'</div>';
      html += '  <div class="lt-count">'+p+' / '+qs.length+' 완료</div>';
      html += '</div>';
    });
    html += '    </div>';

    html += '    <div class="dot-grid">';
    levelQs.forEach(function(qq, i){
      var st = state.progress[qq.id] && state.progress[qq.id].status;
      var cls = 'dot' + (i===state.index?' current':'') + (st==='pass'?' pass':st==='fail'?' fail':'') + (state.bookmarks[qq.id]?' bookmarked':'');
      html += '<div class="'+cls+'" data-action="jump" data-index="'+i+'" title="'+esc(qq.id)+'">'+(st==='pass'?'✓':st==='fail'?'✗':(i+1))+'</div>';
    });
    html += '    </div>';
    html += '  </div>';

    /* main card */
    html += '  <div class="content">';
    html += '    <div class="card">';
    var eyebrowText = state.reviewMode ? ('📌 오답 노트 (복습 모드)') : (state.bookmarkMode ? '🔖 즐겨찾기 모드' : esc(LEVELS[state.level].name));
    html += '      <div class="card-eyebrow">'+eyebrowText+' · 문항 '+(state.index+1)+' / '+levelQs.length+' · '+esc(q.id)+'</div>';
    html += '      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">';
    html += '        <h2 class="card-title" style="margin:0;">'+esc(q.title)+'</h2>';
    html += '        <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;white-space:nowrap;" data-action="toggle-bookmark" data-qid="'+esc(q.id)+'">'+(state.bookmarks[q.id]?'🔖 즐겨찾기 해제':'☆ 즐겨찾기 추가')+'</button>';
    html += '      </div>';
    if(state.reviewMode || state.bookmarkMode){
      html += '      <button class="btn btn-ghost" style="align-self:flex-start;padding:5px 10px;font-size:12px;" data-action="exit-review">← 전체 문제로 돌아가기</button>';
    }
    html += '      <div class="concept"><b>핵심 개념</b> — '+esc(q.concept)+'</div>';

    html += '      <div class="codebox">';
    q.before.forEach(function(l){ html += '<div class="cl muted">'+esc(l)+'</div>'; });
    q.placeholder.forEach(function(l){ html += '<div class="cl muted">'+esc(l)+'</div>'; });
    var savedInput = (state.inputs[q.id] !== undefined) ? state.inputs[q.id] :
                      ((state.progress[q.id] && state.progress[q.id].input) || '');
    html += '<textarea class="blank" id="ans-input" rows="'+(q.rows||2)+'" placeholder="여기에 코드를 입력하세요"></textarea>';
    q.after.forEach(function(l){ html += '<div class="cl muted">'+esc(l)+'</div>'; });
    html += '      </div>';

    html += '      <div class="expected">기대 출력: <code>'+esc(q.expected)+'</code></div>';

    var fb = state.progress[q.id];
    var fbClass = '', fbText = '';
    if(fb && fb.status==='pass'){ fbClass='pass show'; fbText='✓ PASS — 정답입니다.'; }
    else if(fb && fb.status==='fail'){ fbClass='fail show'; fbText='✗ FAIL — 문법을 다시 확인해보세요.'; }

    html += '      <div class="actions">';
    html += '        <button class="btn btn-grade" data-action="grade">채점</button>';
    html += '        <button class="btn btn-ghost" data-action="reveal">'+(state.revealed[q.id]?'정답 숨기기':'정답 보기')+'</button>';
    html += '      </div>';

    html += '      <div class="feedback '+fbClass+'" id="fb-msg">'+fbText+'</div>';

    html += '      <div class="answer-box'+(state.revealed[q.id]?' show':'')+'">';
    html += '        <div class="lbl">🔍 정답</div>';
    q.answer.forEach(function(l){ html += '<div class="al">'+esc(l)+'</div>'; });
    if(q.note){ html += '<div class="note">'+esc(q.note)+'</div>'; }
    html += '      </div>';

    html += '      <div class="nav-row">';
    html += '        <button class="btn btn-nav" data-action="prev" '+(state.index===0?'disabled':'')+'>← 이전</button>';
    html += '        <span class="pos">'+(state.index+1)+' / '+levelQs.length+'</span>';
    html += '        <button class="btn btn-nav" data-action="next" '+(state.index===levelQs.length-1?'disabled':'')+'>다음 →</button>';
    html += '      </div>';

    html += '    </div>';
    html += '  </div>';
    html += '</div>';

    /* terminal log */
    html += '<div class="terminal">';
    html += '  <div class="terminal-head"><span class="terminal-dot"></span><span class="terminal-dot"></span><span class="terminal-dot"></span>&nbsp;&nbsp;test-runner</div>';
    html += '  <div class="terminal-body" id="term-body">';
    if(state.log.length===0){
      html += '<div class="ln">대기 중... 채점 버튼을 눌러보세요.</div>';
    }else{
      state.log.forEach(function(l){
        html += '<div class="ln cmd">$ '+esc(l.cmd)+'</div>';
        html += '<div class="ln '+(l.pass?'pass':'fail')+'">  '+(l.pass?'✓ PASS':'✗ FAIL')+'</div>';
      });
    }
    html += '    <span class="cursor"></span>';
    html += '  </div>';
    html += '</div>';

    app.innerHTML = html;

    var ta = document.getElementById('ans-input');
    if(ta){
      ta.value = savedInput;
      ta.addEventListener('input', function(){ state.inputs[q.id] = ta.value; });
      ta.addEventListener('keydown', function(e){ handleEditorKeydown(e, ta, q); });
    }
    var term = document.getElementById('term-body');
    if(term) term.scrollTop = term.scrollHeight;
  }

  /* ============ 액션 함수 (클릭 · 키보드 공용) ============ */
  function doSelectLevel(lv){
    state.reviewMode = false;
    state.bookmarkMode = false;
    state.level = lv;
    state.index = 0;
    render();
  }
  function doToggleReview(){
    state.reviewMode = !state.reviewMode;
    if(state.reviewMode) state.bookmarkMode = false;
    state.index = 0;
    render();
  }
  function doToggleBookmarkMode(){
    state.bookmarkMode = !state.bookmarkMode;
    if(state.bookmarkMode) state.reviewMode = false;
    state.index = 0;
    render();
  }
  function doExitSpecialMode(){
    state.reviewMode = false;
    state.bookmarkMode = false;
    state.index = 0;
    render();
  }
  function doJump(i){
    state.index = i;
    render();
  }
  function doPrev(){
    if(state.index>0){ state.index--; render(); }
  }
  function doNext(){
    var levelQs = activeQuestionList();
    if(state.index<levelQs.length-1){ state.index++; render(); }
  }
  function doReveal(){
    var levelQs = activeQuestionList();
    var q = levelQs[state.index];
    if(!q) return;
    state.revealed[q.id] = !state.revealed[q.id];
    render();
  }
  function doToggleBookmark(qid){
    if(!qid) return;
    if(state.bookmarks[qid]) delete state.bookmarks[qid];
    else state.bookmarks[qid] = true;
    saveBookmarks();
    render();
  }
  function doGrade(){
    var levelQs = activeQuestionList();
    var q = levelQs[state.index];
    if(!q) return;
    var ta = document.getElementById('ans-input');
    var val = ta ? ta.value : '';
    var pass = gradeQuestion(q, val);
    state.progress[q.id] = {status: pass?'pass':'fail', input: val};
    pushLog(q.id, pass);
    saveProgress();
    render();
  }
  function doReset(){
    if(window.confirm('모든 진행 상황을 초기화할까요? 되돌릴 수 없습니다.')){
      state.progress = {};
      state.inputs = {};
      state.revealed = {};
      state.log = [];
      state.reviewMode = false;
      saveProgress();
      render();
    }
  }
  function focusAnswerInput(){
    var ta = document.getElementById('ans-input');
    if(ta) ta.focus();
  }

  /* ============ 클릭 이벤트 ============ */
  document.getElementById('app').addEventListener('click', function(e){
    var el = e.target.closest('[data-action]');
    if(!el) return;
    var action = el.getAttribute('data-action');

    if(action==='select-level'){
      doSelectLevel(parseInt(el.getAttribute('data-level'),10));
    }else if(action==='toggle-review'){
      doToggleReview();
    }else if(action==='toggle-bookmark-mode'){
      doToggleBookmarkMode();
    }else if(action==='exit-review'){
      doExitSpecialMode();
    }else if(action==='jump'){
      doJump(parseInt(el.getAttribute('data-index'),10));
    }else if(action==='prev'){
      doPrev();
    }else if(action==='next'){
      doNext();
    }else if(action==='reveal'){
      doReveal();
    }else if(action==='toggle-bookmark'){
      doToggleBookmark(el.getAttribute('data-qid'));
    }else if(action==='grade'){
      doGrade();
    }else if(action==='reset'){
      doReset();
    }
  });

  /* ============ 키보드 단축키 ============ */
  document.addEventListener('keydown', function(e){
    var ta = document.getElementById('ans-input');
    var taFocused = document.activeElement === ta;

    // Ctrl/Cmd + Enter : 입력창 포커스 여부와 상관없이 항상 채점
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
      e.preventDefault();
      doGrade();
      return;
    }

    if(taFocused){
      // 입력창에 포커스가 있을 때는 Esc로 빠져나오는 것만 처리 (타이핑 방해 금지)
      if(e.key === 'Escape'){
        e.preventDefault();
        ta.blur();
      }
      return;
    }

    // 입력창 포커스가 해제된 상태에서만 동작
    if(e.key === 'Enter'){
      e.preventDefault();
      focusAnswerInput();
    }else if(e.key === 'ArrowLeft'){
      e.preventDefault();
      doPrev();
    }else if(e.key === 'ArrowRight'){
      e.preventDefault();
      doNext();
    }else if(e.key === 'r' || e.key === 'R'){
      e.preventDefault();
      doReveal();
    }
  });

  /* ============ 시작 ============ */
  render();
  loadProgress().then(render);

})();
</script>
</body>
</html>
