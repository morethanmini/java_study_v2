<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java 자동채점</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15120D;
    --surface:#1E1912;
    --surface2:#241D15;
    --code-bg:#0F0D09;
    --border:#332B20;
    --border-soft:#2A2318;
    --accent:#D98C3D;
    --accent-soft:#E8A552;
    --success:#6FD9A0;
    --fail:#E2604F;
    --text:#F3ECDD;
    --muted:#9C9284;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    --display:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;}

  /* ---------- chapter nav ---------- */
  #chapter-nav{
    position:sticky;top:0;z-index:100;
    background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;gap:4px;padding:10px 20px;overflow-x:auto;
  }
  .ch-btn{
    font-family:var(--mono);font-size:12px;font-weight:500;
    background:transparent;border:1px solid var(--border);border-radius:8px;
    color:var(--muted);padding:7px 14px;cursor:pointer;transition:.15s;white-space:nowrap;
  }
  .ch-btn:hover{border-color:var(--accent-soft);color:var(--text);}
  .ch-btn.ch-active{background:var(--accent);border-color:var(--accent);color:#191309;font-weight:700;}

  #app{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  /* ---------- topbar ---------- */
  .topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:22px;}
  .brand-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--accent-soft);text-transform:uppercase;margin-bottom:6px;}
  .brand-title{font-family:var(--display);font-weight:700;font-size:28px;letter-spacing:-0.01em;margin:0;}
  .brand-sub{color:var(--muted);font-size:13px;margin-top:4px;}
  .top-stats{display:flex;align-items:center;gap:14px;}
  .progress-wrap{min-width:220px;}
  .progress-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:6px;}
  .progress-label b{color:var(--text);font-weight:600;}
  .progress-track{height:8px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-soft));transition:width .3s ease;}
  .reset-btn{font-family:var(--mono);font-size:12px;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;transition:.15s;}
  .reset-btn:hover{border-color:var(--fail);color:var(--fail);}

  /* ---------- layout ---------- */
  .layout{display:grid;grid-template-columns:230px 1fr;gap:18px;}
  @media(max-width:760px){.layout{grid-template-columns:1fr;}}
  .sidebar{display:flex;flex-direction:column;gap:14px;}
  .level-tabs{display:flex;flex-direction:column;gap:6px;}
  @media(max-width:760px){.level-tabs{flex-direction:row;overflow-x:auto;padding-bottom:4px;}}
  .level-tab{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--text);font-family:var(--body);transition:.15s;}
  @media(max-width:760px){.level-tab{flex:0 0 auto;min-width:150px;}}
  .level-tab:hover{border-color:var(--accent-soft);}
  .level-tab.active{border-color:var(--accent);background:var(--surface2);}
  .level-tab .lt-name{font-weight:600;font-size:13px;}
  .level-tab .lt-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .level-tab .lt-count{font-family:var(--mono);font-size:11px;color:var(--accent-soft);margin-top:6px;}

  .dot-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;}
  @media(max-width:760px){.dot-grid{grid-template-columns:repeat(10,1fr);}}
  .dot{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer;transition:.15s;}
  .dot:hover{border-color:var(--accent-soft);}
  .dot.current{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .dot.pass{background:rgba(111,217,160,.14);border-color:var(--success);color:var(--success);}
  .dot.fail{background:rgba(226,96,79,.14);border-color:var(--fail);color:var(--fail);}
  .dot.bookmarked{outline:2px solid var(--accent-soft);outline-offset:1px;}

  .kbd-hint{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px;}
  .kbd-hint kbd{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:10.5px;color:var(--text);}

  /* ---------- question card ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;display:flex;flex-direction:column;gap:14px;}
  .card-eyebrow{font-family:var(--mono);font-size:11px;color:var(--accent-soft);letter-spacing:.08em;text-transform:uppercase;}
  .card-title{font-family:var(--display);font-size:21px;font-weight:600;margin:0;}
  .concept{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;font-size:13.5px;line-height:1.6;color:var(--text);}
  .concept b{color:var(--accent-soft);}
  .codebox{background:var(--code-bg);border:1px solid var(--border-soft);border-radius:10px;padding:14px 16px;font-family:var(--mono);font-size:13.5px;line-height:1.7;}
  .cl{white-space:pre-wrap;color:var(--text);}
  .cl.muted{color:var(--muted);}
  .blank{width:100%;resize:vertical;background:#191309;border:1px dashed var(--accent-soft);border-radius:6px;color:var(--accent-soft);font-family:var(--mono);font-size:13.5px;padding:8px 10px;margin:4px 0;outline:none;}
  .blank:focus{border-style:solid;border-color:var(--accent);}
  .expected{font-family:var(--mono);font-size:12.5px;color:var(--muted);}
  .expected code{color:var(--accent-soft);background:none;}
  .actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .btn{font-family:var(--body);font-weight:600;font-size:13px;border-radius:8px;padding:9px 16px;cursor:pointer;border:1px solid var(--border);transition:.15s;}
  .btn-grade{background:var(--accent);border-color:var(--accent);color:#191309;}
  .btn-grade:hover{background:var(--accent-soft);}
  .btn-ghost{background:transparent;color:var(--muted);}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent-soft);}
  .btn-nav{background:var(--surface2);color:var(--text);}
  .btn-nav:hover{border-color:var(--accent-soft);}
  .btn-nav:disabled{opacity:.35;cursor:not-allowed;}
  .feedback{font-family:var(--mono);font-size:13px;border-radius:8px;padding:9px 12px;display:none;}
  .feedback.show{display:block;}
  .feedback.pass{background:rgba(111,217,160,.12);color:var(--success);border:1px solid rgba(111,217,160,.3);}
  .feedback.fail{background:rgba(226,96,79,.12);color:var(--fail);border:1px solid rgba(226,96,79,.3);}
  .answer-box{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
  .answer-box.show{display:block;}
  .answer-box .lbl{font-family:var(--mono);font-size:11px;color:var(--accent-soft);margin-bottom:8px;letter-spacing:.06em;}
  .answer-box .al{font-family:var(--mono);font-size:13.5px;color:var(--text);white-space:pre-wrap;}
  .answer-box .note{margin-top:10px;font-size:13px;color:var(--muted);line-height:1.6;}
  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
  .nav-row .pos{font-family:var(--mono);font-size:12px;color:var(--muted);}

  /* ---------- terminal log ---------- */
  .terminal{margin-top:20px;background:var(--code-bg);border:1px solid var(--border-soft);border-radius:12px;overflow:hidden;}
  .terminal-head{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border-soft);font-family:var(--mono);font-size:11.5px;color:var(--muted);}
  .terminal-dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
  .terminal-body{height:150px;overflow-y:auto;padding:12px 14px;font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--muted);}
  .terminal-body .ln{white-space:pre-wrap;}
  .terminal-body .ln.pass{color:var(--success);}
  .terminal-body .ln.fail{color:var(--fail);}
  .terminal-body .ln.cmd{color:var(--accent-soft);}
  .cursor{display:inline-block;width:7px;height:13px;background:var(--accent-soft);animation:blink 1s steps(1) infinite;vertical-align:-2px;}
  @keyframes blink{50%{opacity:0;}}
  .loading{padding:60px 0;text-align:center;color:var(--muted);font-family:var(--mono);font-size:13px;}
</style>
<script src="ch1-basic-syntax/items/levels.js"></script>
<script src="ch1-basic-syntax/items/questions.js"></script>
<script src="ch2-oop/items/levels.js"></script>
<script src="ch2-oop/items/questions.js"></script>
<script src="ch3-collections/items/levels.js"></script>
<script src="ch3-collections/items/questions.js"></script>
<script src="ch4-data-structures/items/levels.js"></script>
<script src="ch4-data-structures/items/questions.js"></script>
<script src="ch5-lambda-stream-io/items/levels.js"></script>
<script src="ch5-lambda-stream-io/items/questions.js"></script>
</head>
<body>

<div id="chapter-nav">
  <button class="ch-btn ch-active" data-ch="1">Ch1. 기본 문법</button>
  <button class="ch-btn" data-ch="2">Ch2. OOP 기초</button>
  <button class="ch-btn" data-ch="3">Ch3. 컬렉션</button>
  <button class="ch-btn" data-ch="4">Ch4. 자료구조 응용</button>
  <button class="ch-btn" data-ch="5">Ch5. 람다·Stream·IO</button>
</div>

<div id="app"><div class="loading">진행 상황 불러오는 중...</div></div>

<script>
(function(){


  /* ============ 현재 챕터 상태 ============ */
  var currentCh = 1;
  var LEVELS    = CHAPTER_DATA[1].levels;
  var QUESTIONS = CHAPTER_DATA[1].questions;
  var STORAGE_KEY  = CHAPTER_DATA[1].storageKey;
  var BOOKMARK_KEY = CHAPTER_DATA[1].bookmarkKey;

  /* ============ 앱 상태 ============ */
  var state = {
    loaded:false,
    progress:{},
    inputs:{},
    revealed:{},
    bookmarks:{},
    level:0, index:0, log:[],
    reviewMode:false, bookmarkMode:false
  };

  /* ============ 저장소 ============ */
  var store = {
    get: function(key){
      if(window.storage && window.storage.get){
        return window.storage.get(key, false).then(function(res){ return res && res.value ? res.value : null; });
      }
      return Promise.resolve(localStorage.getItem(key));
    },
    set: function(key, val){
      if(window.storage && window.storage.set) return window.storage.set(key, val, false);
      try{ localStorage.setItem(key, val); }catch(e){}
      return Promise.resolve();
    }
  };

  async function loadProgress(){
    try{ var v = await store.get(STORAGE_KEY); if(v) state.progress = JSON.parse(v)||{}; }catch(e){ state.progress={}; }
    try{ var b = await store.get(BOOKMARK_KEY); if(b) state.bookmarks = JSON.parse(b)||{}; }catch(e){ state.bookmarks={}; }
    state.loaded = true;
  }
  async function saveProgress(){
    try{ await store.set(STORAGE_KEY, JSON.stringify(state.progress)); }catch(e){}
  }
  async function saveBookmarks(){
    try{ await store.set(BOOKMARK_KEY, JSON.stringify(state.bookmarks)); }catch(e){}
  }

  /* ============ 챕터 전환 ============ */
  function switchChapter(ch){
    currentCh = ch;
    LEVELS    = CHAPTER_DATA[ch].levels;
    QUESTIONS = CHAPTER_DATA[ch].questions;
    STORAGE_KEY  = CHAPTER_DATA[ch].storageKey;
    BOOKMARK_KEY = CHAPTER_DATA[ch].bookmarkKey;
    state = { loaded:false, progress:{}, inputs:{}, revealed:{}, bookmarks:{}, level:0, index:0, log:[], reviewMode:false, bookmarkMode:false };
    document.querySelectorAll('.ch-btn').forEach(function(b){
      b.classList.toggle('ch-active', parseInt(b.getAttribute('data-ch')) === ch);
    });
    render();
    loadProgress().then(render);
  }

  document.getElementById('chapter-nav').addEventListener('click', function(e){
    var btn = e.target.closest('.ch-btn');
    if(!btn) return;
    var ch = parseInt(btn.getAttribute('data-ch'));
    if(ch !== currentCh) switchChapter(ch);
  });

  /* ============ 유틸 ============ */
  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function questionsOfLevel(lv){ return QUESTIONS.filter(function(q){return q.level===lv;}); }
  function failedQuestions(){ return QUESTIONS.filter(function(q){ return state.progress[q.id]&&state.progress[q.id].status==='fail'; }); }
  function bookmarkedQuestions(){ return QUESTIONS.filter(function(q){ return !!state.bookmarks[q.id]; }); }
  function activeQuestionList(){
    if(state.reviewMode) return failedQuestions();
    if(state.bookmarkMode) return bookmarkedQuestions();
    return questionsOfLevel(state.level);
  }
  function totalPassed(){
    var n=0; Object.keys(state.progress).forEach(function(k){ if(state.progress[k]&&state.progress[k].status==='pass') n++; }); return n;
  }
  function levelPassed(lv){
    var n=0; questionsOfLevel(lv).forEach(function(q){ if(state.progress[q.id]&&state.progress[q.id].status==='pass') n++; }); return n;
  }

  /* ============ 채점 ============ */
  function gradeQuestion(q,input){ return q.regex.every(function(r){ return r.test(input); }); }
  function pushLog(qid,pass){ state.log.push({cmd:'check '+qid,pass:pass}); if(state.log.length>40) state.log.shift(); }

  /* ============ 에디터 보조 ============ */
  var BRACKET_OPEN_CLOSE={'(':')',  '[':']', '{':'}'}; var BRACKET_CLOSE_CHARS={')':true,']':true,'}':true}; var QUOTE_CHARS={'"':true,"'":true}; var INDENT_UNIT='    ';
  function lineBoundsOf(v,s,e){ var ls=v.lastIndexOf('\n',s-1)+1,le=v.indexOf('\n',e); if(le===-1)le=v.length; return {lineStart:ls,lineEnd:le}; }
  function indentSelection(ta,q){ var v=ta.value,s=ta.selectionStart,e=ta.selectionEnd; if(s===e){ ta.value=v.slice(0,s)+INDENT_UNIT+v.slice(s); ta.selectionStart=ta.selectionEnd=s+INDENT_UNIT.length; state.inputs[q.id]=ta.value; return; } var b=lineBoundsOf(v,s,e),lines=v.slice(b.lineStart,b.lineEnd).split('\n'),ind=lines.map(function(l){return INDENT_UNIT+l;}).join('\n'); ta.value=v.slice(0,b.lineStart)+ind+v.slice(b.lineEnd); ta.selectionStart=s+INDENT_UNIT.length; ta.selectionEnd=e+INDENT_UNIT.length*lines.length; state.inputs[q.id]=ta.value; }
  function outdentSelection(ta,q){ var v=ta.value,s=ta.selectionStart,e=ta.selectionEnd,b=lineBoundsOf(v,s,e),lines=v.slice(b.lineStart,b.lineEnd).split('\n'),removed=[],out=lines.map(function(l){ var m=l.match(/^( {1,4}|\t)/),n=m?m[0].length:0; removed.push(n); return l.slice(n); }).join('\n'); ta.value=v.slice(0,b.lineStart)+out+v.slice(b.lineEnd); var fr=removed[0]||0,tr=removed.reduce(function(a,c){return a+c;},0); ta.selectionStart=Math.max(b.lineStart,s-fr); ta.selectionEnd=Math.max(ta.selectionStart,e-tr); state.inputs[q.id]=ta.value; }
  function autoIndentNewline(ta,q){ var v=ta.value,pos=ta.selectionStart,ls=v.lastIndexOf('\n',pos-1)+1,cur=v.slice(ls,pos),im=cur.match(/^[ \t]*/),ind=im?im[0]:'',lns=v.slice(0,pos).replace(/\s+$/,'').slice(-1),ex=(lns==='{')? INDENT_UNIT:'',ins='\n'+ind+ex; ta.value=v.slice(0,pos)+ins+v.slice(pos); var np=pos+ins.length; ta.selectionStart=ta.selectionEnd=np; state.inputs[q.id]=ta.value; }
  function handleBracketKeydown(e,ta,q){ var key=e.key; if(e.ctrlKey||e.metaKey||e.altKey) return false; if(BRACKET_OPEN_CLOSE[key]){ var s=ta.selectionStart,en=ta.selectionEnd,v=ta.value,cl=BRACKET_OPEN_CLOSE[key]; if(s!==en){ var sel=v.slice(s,en); ta.value=v.slice(0,s)+key+sel+cl+v.slice(en); ta.selectionStart=s+1; ta.selectionEnd=en+1; }else{ ta.value=v.slice(0,s)+key+cl+v.slice(s); ta.selectionStart=ta.selectionEnd=s+1; } state.inputs[q.id]=ta.value; e.preventDefault(); return true; } if(QUOTE_CHARS[key]){ var s=ta.selectionStart,en=ta.selectionEnd,v=ta.value; if(s!==en){ var sel=v.slice(s,en); ta.value=v.slice(0,s)+key+sel+key+v.slice(en); ta.selectionStart=s+1; ta.selectionEnd=en+1; state.inputs[q.id]=ta.value; e.preventDefault(); return true; } if(v[s]===key){ ta.selectionStart=ta.selectionEnd=s+1; e.preventDefault(); return true; } ta.value=v.slice(0,s)+key+key+v.slice(s); ta.selectionStart=ta.selectionEnd=s+1; state.inputs[q.id]=ta.value; e.preventDefault(); return true; } if(BRACKET_CLOSE_CHARS[key]){ var p=ta.selectionStart; if(ta.selectionStart===ta.selectionEnd&&ta.value[p]===key){ ta.selectionStart=ta.selectionEnd=p+1; e.preventDefault(); return true; } return false; } if(key==='Backspace'){ var ss=ta.selectionStart,se=ta.selectionEnd; if(ss===se&&ss>0){ var pc=ta.value[ss-1],nc=ta.value[ss]; if((BRACKET_OPEN_CLOSE[pc]&&BRACKET_OPEN_CLOSE[pc]===nc)||(QUOTE_CHARS[pc]&&pc===nc)){ ta.value=ta.value.slice(0,ss-1)+ta.value.slice(ss+1); ta.selectionStart=ta.selectionEnd=ss-1; state.inputs[q.id]=ta.value; e.preventDefault(); return true; } } return false; } return false; }
  function handleEditorKeydown(e,ta,q){ if(e.key==='Tab'&&!e.ctrlKey&&!e.altKey&&!e.metaKey){ e.preventDefault(); if(e.shiftKey) outdentSelection(ta,q); else indentSelection(ta,q); return; } if(e.key==='Enter'&&!e.ctrlKey&&!e.metaKey){ e.preventDefault(); autoIndentNewline(ta,q); return; } handleBracketKeydown(e,ta,q); }

  /* ============ 렌더링 ============ */
  function renderEmptySpecial(){
    var app=document.getElementById('app'),passed=totalPassed(),isB=state.bookmarkMode;
    var title=isB?'🔖 아직 즐겨찾기한 문제가 없습니다':'🎉 지금은 틀린 문제가 없습니다';
    var html='';
    html+='<div class="topbar"><div><div class="brand-eyebrow">$ run --suite '+CHAPTER_DATA[currentCh].suite+'</div><h1 class="brand-title">'+CHAPTER_DATA[currentCh].brandTitle+'</h1></div>';
    html+='<div class="top-stats"><button class="reset-btn" data-action="reset">진행 초기화</button></div></div>';
    html+='<div class="card" style="text-align:center;padding:50px 24px;"><div class="card-title">'+title+'</div>';
    html+='<p style="color:var(--muted);font-size:13.5px;margin:10px 0 18px;">전체 진행: '+passed+' / '+QUESTIONS.length+'</p>';
    html+='<button class="btn btn-grade" data-action="exit-review">전체 문제로 돌아가기</button></div>';
    app.innerHTML=html;
  }

  function render(){
    var app=document.getElementById('app');
    if(!state.loaded){ app.innerHTML='<div class="loading">진행 상황 불러오는 중...</div>'; return; }
    var levelQs=activeQuestionList();
    if((state.reviewMode||state.bookmarkMode)&&levelQs.length===0){ renderEmptySpecial(); return; }
    if(state.index>=levelQs.length) state.index=0;
    var q=levelQs[state.index],passed=totalPassed(),html='';

    html+='<div class="topbar"><div>';
    html+='<div class="brand-eyebrow">$ run --suite '+CHAPTER_DATA[currentCh].suite+'</div>';
    html+='<h1 class="brand-title">'+CHAPTER_DATA[currentCh].brandTitle+'</h1>';
    html+='<div class="brand-sub">코드를 입력하고 채점하면, 정규식으로 문법을 검증합니다 (실제 자바 실행 X).</div>';
    html+='<div class="kbd-hint"><kbd>Ctrl/Cmd</kbd>+<kbd>Enter</kbd> 채점 · <kbd>←</kbd><kbd>→</kbd> 이전/다음 문제 · <kbd>R</kbd> 정답 보기 · <kbd>Esc</kbd> 입력창 빠져나오기 · <kbd>Enter</kbd> 입력창 포커스</div>';
    html+='</div><div class="top-stats"><div class="progress-wrap">';
    html+='<div class="progress-label"><span>전체 진행</span><b>'+passed+' / '+QUESTIONS.length+'</b></div>';
    html+='<div class="progress-track"><div class="progress-fill" style="width:'+Math.round(passed/QUESTIONS.length*100)+'%"></div></div>';
    html+='</div><button class="reset-btn" data-action="reset">진행 초기화</button></div></div>';

    html+='<div class="layout"><div class="sidebar">';
    var failCount=failedQuestions().length,bmCount=Object.keys(state.bookmarks).filter(function(k){return state.bookmarks[k];}).length;
    html+='<button class="level-tab" data-action="toggle-review" style="border-color:'+(state.reviewMode?'var(--accent)':'var(--border)')+';background:'+(state.reviewMode?'var(--surface2)':'var(--surface)')+';">';
    html+='<div class="lt-name">📌 오답 노트</div><div class="lt-sub">'+(state.reviewMode?'복습 모드 진행 중':'틀린 문제만 모아 다시 풀기')+'</div><div class="lt-count">'+failCount+'개 대기 중</div></button>';
    html+='<button class="level-tab" data-action="toggle-bookmark-mode" style="border-color:'+(state.bookmarkMode?'var(--accent)':'var(--border)')+';background:'+(state.bookmarkMode?'var(--surface2)':'var(--surface)')+';">';
    html+='<div class="lt-name">🔖 즐겨찾기</div><div class="lt-sub">'+(state.bookmarkMode?'즐겨찾기 모드 진행 중':'북마크한 문제만 모아 보기')+'</div><div class="lt-count">'+bmCount+'개 저장됨</div></button>';
    html+='<div class="level-tabs">';
    LEVELS.forEach(function(lv){
      var qs=questionsOfLevel(lv.id),p=levelPassed(lv.id);
      html+='<div class="level-tab'+((!state.reviewMode&&!state.bookmarkMode&&state.level===lv.id)?' active':'')+'" data-action="select-level" data-level="'+lv.id+'">';
      html+='<div class="lt-name">'+esc(lv.name)+'</div><div class="lt-sub">'+esc(lv.sub)+'</div><div class="lt-count">'+p+' / '+qs.length+' 완료</div></div>';
    });
    html+='</div><div class="dot-grid">';
    levelQs.forEach(function(qq,i){
      var st=state.progress[qq.id]&&state.progress[qq.id].status;
      var cls='dot'+(i===state.index?' current':'')+(st==='pass'?' pass':st==='fail'?' fail':'')+(state.bookmarks[qq.id]?' bookmarked':'');
      html+='<div class="'+cls+'" data-action="jump" data-index="'+i+'" title="'+esc(qq.id)+'">'+(st==='pass'?'✓':st==='fail'?'✗':(i+1))+'</div>';
    });
    html+='</div></div>';

    html+='<div class="content"><div class="card">';
    var eyebrow=state.reviewMode?'📌 오답 노트 (복습 모드)':(state.bookmarkMode?'🔖 즐겨찾기 모드':esc(LEVELS[state.level].name));
    html+='<div class="card-eyebrow">'+eyebrow+' · 문항 '+(state.index+1)+' / '+levelQs.length+' · '+esc(q.id)+'</div>';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">';
    html+='<h2 class="card-title" style="margin:0;">'+esc(q.title)+'</h2>';
    html+='<button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;white-space:nowrap;" data-action="toggle-bookmark" data-qid="'+esc(q.id)+'">'+(state.bookmarks[q.id]?'🔖 즐겨찾기 해제':'☆ 즐겨찾기 추가')+'</button></div>';
    if(state.reviewMode||state.bookmarkMode) html+='<button class="btn btn-ghost" style="align-self:flex-start;padding:5px 10px;font-size:12px;" data-action="exit-review">← 전체 문제로 돌아가기</button>';
    html+='<div class="concept"><b>핵심 개념</b> — '+esc(q.concept)+'</div>';
    html+='<div class="codebox">';
    q.before.forEach(function(l){ html+='<div class="cl muted">'+esc(l)+'</div>'; });
    q.placeholder.forEach(function(l){ html+='<div class="cl muted">'+esc(l)+'</div>'; });
    var savedInput=(state.inputs[q.id]!==undefined)?state.inputs[q.id]:((state.progress[q.id]&&state.progress[q.id].input)||'');
    html+='<textarea class="blank" id="ans-input" rows="'+(q.rows||2)+'" placeholder="여기에 코드를 입력하세요"></textarea>';
    q.after.forEach(function(l){ html+='<div class="cl muted">'+esc(l)+'</div>'; });
    html+='</div>';
    html+='<div class="expected">기대 출력: <code>'+esc(q.expected)+'</code></div>';
    var fb=state.progress[q.id],fbClass='',fbText='';
    if(fb&&fb.status==='pass'){ fbClass='pass show'; fbText='✓ PASS — 정답입니다.'; }
    else if(fb&&fb.status==='fail'){ fbClass='fail show'; fbText='✗ FAIL — 문법을 다시 확인해보세요.'; }
    html+='<div class="actions"><button class="btn btn-grade" data-action="grade">채점</button>';
    html+='<button class="btn btn-ghost" data-action="reveal">'+(state.revealed[q.id]?'정답 숨기기':'정답 보기')+'</button></div>';
    html+='<div class="feedback '+fbClass+'" id="fb-msg">'+fbText+'</div>';
    html+='<div class="answer-box'+(state.revealed[q.id]?' show':'')+'">';
    html+='<div class="lbl">🔍 정답</div>';
    q.answer.forEach(function(l){ html+='<div class="al">'+esc(l)+'</div>'; });
    if(q.note) html+='<div class="note">'+esc(q.note)+'</div>';
    html+='</div>';
    html+='<div class="nav-row">';
    html+='<button class="btn btn-nav" data-action="prev" '+(state.index===0?'disabled':'')+'>← 이전</button>';
    html+='<span class="pos">'+(state.index+1)+' / '+levelQs.length+'</span>';
    html+='<button class="btn btn-nav" data-action="next" '+(state.index===levelQs.length-1?'disabled':'')+'>다음 →</button>';
    html+='</div></div></div></div>';

    html+='<div class="terminal"><div class="terminal-head"><span class="terminal-dot"></span><span class="terminal-dot"></span><span class="terminal-dot"></span>&nbsp;&nbsp;test-runner</div>';
    html+='<div class="terminal-body" id="term-body">';
    if(state.log.length===0){ html+='<div class="ln">대기 중... 채점 버튼을 눌러보세요.</div>'; }
    else{ state.log.forEach(function(l){ html+='<div class="ln cmd">$ '+esc(l.cmd)+'</div><div class="ln '+(l.pass?'pass':'fail')+'">  '+(l.pass?'✓ PASS':'✗ FAIL')+'</div>'; }); }
    html+='<span class="cursor"></span></div></div>';

    app.innerHTML=html;
    var ta=document.getElementById('ans-input');
    if(ta){ ta.value=savedInput; ta.addEventListener('input',function(){ state.inputs[q.id]=ta.value; }); ta.addEventListener('keydown',function(e){ handleEditorKeydown(e,ta,q); }); }
    var term=document.getElementById('term-body'); if(term) term.scrollTop=term.scrollHeight;
  }

  /* ============ 액션 ============ */
  function doSelectLevel(lv){ state.reviewMode=false; state.bookmarkMode=false; state.level=lv; state.index=0; render(); }
  function doToggleReview(){ state.reviewMode=!state.reviewMode; if(state.reviewMode) state.bookmarkMode=false; state.index=0; render(); }
  function doToggleBookmarkMode(){ state.bookmarkMode=!state.bookmarkMode; if(state.bookmarkMode) state.reviewMode=false; state.index=0; render(); }
  function doExitSpecialMode(){ state.reviewMode=false; state.bookmarkMode=false; state.index=0; render(); }
  function doJump(i){ state.index=i; render(); }
  function doPrev(){ if(state.index>0){ state.index--; render(); } }
  function doNext(){ var lq=activeQuestionList(); if(state.index<lq.length-1){ state.index++; render(); } }
  function doReveal(){ var lq=activeQuestionList(),q=lq[state.index]; if(!q) return; state.revealed[q.id]=!state.revealed[q.id]; render(); }
  function doToggleBookmark(qid){ if(!qid) return; if(state.bookmarks[qid]) delete state.bookmarks[qid]; else state.bookmarks[qid]=true; saveBookmarks(); render(); }
  function doGrade(){ var lq=activeQuestionList(),q=lq[state.index]; if(!q) return; var ta=document.getElementById('ans-input'),val=ta?ta.value:''; var pass=gradeQuestion(q,val); state.progress[q.id]={status:pass?'pass':'fail',input:val}; pushLog(q.id,pass); saveProgress(); render(); }
  function doReset(){ if(window.confirm('모든 진행 상황을 초기화할까요? 되돌릴 수 없습니다.')){ state.progress={}; state.inputs={}; state.revealed={}; state.log=[]; state.reviewMode=false; saveProgress(); render(); } }
  function focusAnswerInput(){ var ta=document.getElementById('ans-input'); if(ta) ta.focus(); }

  /* ============ 이벤트 ============ */
  document.getElementById('app').addEventListener('click',function(e){
    var el=e.target.closest('[data-action]'); if(!el) return; var action=el.getAttribute('data-action');
    if(action==='select-level') doSelectLevel(parseInt(el.getAttribute('data-level'),10));
    else if(action==='toggle-review') doToggleReview();
    else if(action==='toggle-bookmark-mode') doToggleBookmarkMode();
    else if(action==='exit-review') doExitSpecialMode();
    else if(action==='jump') doJump(parseInt(el.getAttribute('data-index'),10));
    else if(action==='prev') doPrev();
    else if(action==='next') doNext();
    else if(action==='reveal') doReveal();
    else if(action==='toggle-bookmark') doToggleBookmark(el.getAttribute('data-qid'));
    else if(action==='grade') doGrade();
    else if(action==='reset') doReset();
  });

  document.addEventListener('keydown',function(e){
    var ta=document.getElementById('ans-input'),taf=document.activeElement===ta;
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); doGrade(); return; }
    if(taf){ if(e.key==='Escape'){ e.preventDefault(); ta.blur(); } return; }
    if(e.key==='Enter'){ e.preventDefault(); focusAnswerInput(); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); doPrev(); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); doNext(); }
    else if(e.key==='r'||e.key==='R'){ e.preventDefault(); doReveal(); }
  });

  /* ============ 시작 ============ */
  render();
  loadProgress().then(render);

})();
</script>
</body>
</html>
