<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java 문법 채점기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f0f4f8;
        --surface: #ffffff;
        --surface2: #e8eff6;
        --code-bg: #f5f8fb;
        --border: #c9d8e8;
        --border-soft: #d8e6f0;
        --accent-hard: #89097e;
        --accent: #2e86c1;
        --accent-soft: #4da3d4;
        --success: #1a8a56;
        --fail: #c0392b;
        --text: #1a2733;
        --muted: #5d7a8a;
        --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        --display: "Space Grotesk", sans-serif;
        --body: "Inter", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
      }

      /* ---------- chapter nav ---------- */
      #chapter-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 4px;
        padding: 10px 20px;
        overflow-x: auto;
      }
      .ch-btn {
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        padding: 7px 14px;
        cursor: pointer;
        transition: 0.15s;
        white-space: nowrap;
      }
      .ch-btn:hover {
        border-color: var(--accent-soft);
        color: var(--text);
      }
      .ch-btn.ch-active {
        background: var(--accent);
        border-color: var(--accent);
        color: #191309;
        font-weight: 700;
      }

      #app {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }

      /* ---------- topbar ---------- */
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 22px;
      }
      .brand-eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        color: var(--accent-soft);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .brand-title {
        font-family: var(--display);
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .brand-sub {
        color: var(--muted);
        font-size: 13px;
        margin-top: 4px;
      }
      .top-stats {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .progress-wrap {
        min-width: 220px;
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .progress-label b {
        color: var(--text);
        font-weight: 600;
      }
      .progress-track {
        height: 8px;
        border-radius: 99px;
        background: var(--surface2);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-soft));
        transition: width 0.3s ease;
      }
      .reset-btn {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        transition: 0.15s;
      }
      .reset-btn:hover {
        border-color: var(--fail);
        color: var(--fail);
      }

      /* ---------- level nav ---------- */
      #level-nav {
        position: sticky;
        top: 44px;
        z-index: 99;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 20px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      #level-nav::-webkit-scrollbar {
        display: none;
      }
      .lv-btn {
        font-family: var(--body);
        font-size: 12px;
        font-weight: 500;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        padding: 6px 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: 0.15s;
        flex: 0 0 auto;
      }
      .lv-btn:hover {
        border-color: var(--accent-soft);
        color: var(--text);
      }
      .lv-btn.lv-active {
        background: var(--surface2);
        border-color: var(--accent);
        color: var(--text);
      }
      .lv-btn.lv-done {
        background: rgba(111, 217, 160, 0.12);
        border-color: rgba(111, 217, 160, 0.3);
        color: var(--success);
      }
      .lv-btn.lv-done.lv-active {
        background: rgba(111, 217, 160, 0.22);
        border-color: rgba(111, 217, 160, 0.5);
        color: var(--success);
      }
      .lv-btn.lv-special {
        border-color: var(--border);
      }
      .lv-btn.lv-special.lv-on {
        background: var(--accent);
        border-color: var(--accent);
        color: #191309;
      }
      .lv-sep {
        width: 1px;
        height: 20px;
        background: var(--border);
        flex: 0 0 auto;
        margin: 0 4px;
      }

      /* ---------- layout ---------- */
      .layout {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .dot-grid-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
      }

      .dot-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
        gap: 6px;
      }
      .dot {
        aspect-ratio: 1;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        cursor: pointer;
        transition: 0.15s;
      }
      .dot:hover {
        border-color: var(--accent-soft);
      }
      .dot.current {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .dot.pass {
        background: rgba(111, 217, 160, 0.14);
        border-color: var(--success);
        color: var(--success);
      }
      .dot.fail {
        background: rgba(226, 96, 79, 0.14);
        border-color: var(--fail);
        color: var(--fail);
      }
      .dot.bookmarked {
        outline: 2px solid var(--accent-soft);
        outline-offset: 1px;
      }

      .kbd-hint {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        margin-top: 6px;
      }
      .kbd-hint kbd {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--text);
      }

      /* ---------- question card ---------- */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .card-eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent-soft);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .card-title {
        font-family: var(--display);
        font-size: 21px;
        font-weight: 600;
        margin: 0;
      }
      .concept {
        background: var(--surface2);
        border-left: 3px solid var(--accent);
        border-radius: 0 8px 8px 0;
        padding: 10px 14px;
        font-size: 13.5px;
        line-height: 1.6;
        color: var(--text);
      }
      .concept b {
        color: var(--accent-soft);
      }
      .codebox {
        background: var(--code-bg);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 14px 16px;
        font-family: var(--mono);
        font-size: 13.5px;
        line-height: 1.7;
      }
      .cl {
        white-space: pre-wrap;
        color: var(--text);
      }
      .cl.muted {
        color: var(--muted);
      }
      .blank {
        width: 100%;
        resize: none;
        overflow: hidden;
        background: #deeaf4;
        border: 1px dashed var(--accent-soft);
        border-radius: 6px;
        color: var(--accent-hard);
        font-family: "Roboto Mono", var(--mono);
        font-size: 13.5px;
        padding: 8px 10px;
        margin: 4px 0;
        outline: none;
      }
      .blank:focus {
        border-style: solid;
        border-color: var(--accent);
      }
      .expected {
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--muted);
      }
      .expected code {
        color: var(--accent-soft);
        background: none;
        white-space: pre;
        display: inline-block;
        vertical-align: top;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .btn {
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        border-radius: 8px;
        padding: 9px 16px;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: 0.15s;
      }
      .btn-grade {
        background: var(--accent);
        border-color: var(--accent);
        color: #191309;
      }
      .btn-grade:hover {
        background: var(--accent-soft);
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--accent-soft);
      }
      .btn-nav {
        background: var(--surface2);
        color: var(--text);
      }
      .btn-nav:hover {
        border-color: var(--accent-soft);
      }
      .btn-nav:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .feedback {
        font-family: var(--mono);
        font-size: 13px;
        border-radius: 8px;
        padding: 9px 12px;
        display: none;
      }
      .feedback.show {
        display: block;
      }
      .feedback.pass {
        background: rgba(111, 217, 160, 0.12);
        color: var(--success);
        border: 1px solid rgba(111, 217, 160, 0.3);
      }
      .feedback.fail {
        background: rgba(226, 96, 79, 0.12);
        color: var(--fail);
        border: 1px solid rgba(226, 96, 79, 0.3);
      }
      .output-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 12px;
        font-family: var(--mono);
        font-size: 13px;
      }
      .output-label {
        font-size: 11px;
        color: var(--accent-soft);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        display: block;
        margin-bottom: 4px;
      }
      .output-val {
        margin: 0;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-all;
      }
      .answer-box {
        display: none;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .answer-box.show {
        display: block;
      }
      .answer-box .lbl {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent-soft);
        margin-bottom: 8px;
        letter-spacing: 0.06em;
      }
      .answer-box .al {
        font-family: "Roboto Mono", var(--mono);
        font-size: 13.5px;
        color: var(--text);
        white-space: pre-wrap;
      }
      .answer-box .note {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
      }
      .nav-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 4px;
      }
      .nav-row .pos {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }

      /* ---------- terminal log ---------- */
      .terminal {
        margin-top: 20px;
        background: var(--code-bg);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        overflow: hidden;
      }
      .terminal-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border-soft);
        font-family: var(--mono);
        font-size: 11.5px;
        color: var(--muted);
      }
      .terminal-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--border);
      }
      .terminal-body {
        height: 150px;
        overflow-y: auto;
        padding: 12px 14px;
        font-family: var(--mono);
        font-size: 12.5px;
        line-height: 1.7;
        color: var(--muted);
      }
      .terminal-body .ln {
        white-space: pre-wrap;
      }
      .terminal-body .ln.pass {
        color: var(--success);
      }
      .terminal-body .ln.fail {
        color: var(--fail);
      }
      .terminal-body .ln.cmd {
        color: var(--accent-soft);
      }
      .cursor {
        display: inline-block;
        width: 7px;
        height: 13px;
        background: var(--accent-soft);
        animation: blink 1s steps(1) infinite;
        vertical-align: -2px;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      .loading {
        padding: 60px 0;
        text-align: center;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 13px;
      }

      /* ---------- overview ---------- */
      .ov-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .ov-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.15s;
      }
      .ov-card:hover {
        border-color: var(--accent-soft);
        transform: translateY(-2px);
      }
      .ov-card-head {
        padding: 16px 18px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        border-bottom: 2px solid var(--border);
      }
      .ov-ch-label {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
      }
      .ov-ch-title {
        font-family: var(--display);
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }
      .ov-ch-stats {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--muted);
      }
      .ov-kw-list {
        list-style: none;
        margin: 0;
        padding: 12px 18px 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
      }
      .ov-kw-list li {
        font-size: 12.5px;
        color: var(--muted);
        padding-left: 12px;
        position: relative;
        line-height: 1.4;
      }
      .ov-kw-list li::before {
        content: "·";
        position: absolute;
        left: 2px;
        color: var(--accent);
      }
      .ov-card-footer {
        padding: 9px 18px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        border-top: 1px solid var(--border-soft);
        text-align: right;
        transition: color 0.15s;
      }
      .ov-card:hover .ov-card-footer {
        color: var(--accent-soft);
      }
      .ov-flow {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 4px;
      }
      .ov-flow-item {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 5px 12px;
        white-space: nowrap;
      }
      .ov-arrow {
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
      }
      .ov-notice {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-align: right;
        margin-top: 6px;
      }

      /* ========== 모바일 반응형 ========== */
      @media (max-width: 600px) {
        /* chapter nav */
        #chapter-nav {
          padding: 8px 12px;
          gap: 6px;
        }
        .ch-btn {
          font-size: 11px;
          padding: 6px 10px;
        }

        /* app 패딩 */
        #app {
          padding: 14px 12px 80px;
        }

        /* topbar */
        .topbar {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
          margin-bottom: 14px;
        }
        .brand-title {
          font-size: 20px;
        }
        .brand-sub {
          font-size: 12px;
        }
        .top-stats {
          width: 100%;
        }
        .progress-wrap {
          min-width: 0;
          width: 100%;
        }
        .reset-btn {
          font-size: 11px;
          padding: 6px 10px;
        }

        /* level nav */
        #level-nav {
          top: 38px;
          padding: 6px 12px;
          gap: 5px;
        }
        .lv-btn {
          font-size: 11px;
          padding: 5px 10px;
        }

        /* dot grid */
        .dot-grid {
          gap: 4px;
        }
        .dot-grid-wrap {
          padding: 8px;
        }
        .dot {
          font-size: 8px;
          min-height: 28px;
        }

        /* kbd hint 숨기기 (모바일엔 키보드 단축키 불필요) */
        .kbd-hint {
          display: none;
        }

        /* 카드 */
        .card {
          padding: 14px 14px;
          gap: 12px;
          border-radius: 12px;
        }
        .card-title {
          font-size: 17px;
        }
        .concept {
          font-size: 13px;
          padding: 9px 12px;
        }

        /* 코드박스 */
        .codebox {
          padding: 10px 12px;
          font-size: 12.5px;
          overflow-x: auto;
        }
        .blank {
          font-size: 12.5px;
          padding: 8px 10px;
        }

        /* 버튼 */
        .btn {
          font-size: 13px;
          padding: 10px 14px;
        }
        .actions {
          gap: 6px;
        }
        .btn-grade,
        .btn-ghost {
          width: 100%;
        }

        /* 네비 버튼 */
        .nav-row {
          gap: 8px;
        }
        .btn-nav {
          flex: 1;
          text-align: center;
          font-size: 13px;
          padding: 10px 8px;
        }

        /* 정답 박스 */
        .answer-box {
          padding: 12px;
        }
        .answer-box .al {
          font-size: 12.5px;
        }

        /* 터미널 */
        .terminal {
          margin-top: 14px;
        }
        .terminal-body {
          height: 120px;
          font-size: 12px;
        }
      }
    </style>
    <script src="ch1-basic-syntax/items/levels.js"></script>
    <script src="ch1-basic-syntax/items/questions.js"></script>
    <script src="ch2-oop/items/levels.js"></script>
    <script src="ch2-oop/items/questions.js"></script>
    <script src="ch3-collections/items/levels.js"></script>
    <script src="ch3-collections/items/questions.js"></script>
    <script src="ch4-data-structures/items/levels.js"></script>
    <script src="ch4-data-structures/items/questions.js"></script>
    <script src="ch5-lambda-stream-io/items/levels.js"></script>
    <script src="ch5-lambda-stream-io/items/questions.js"></script>
  </head>
  <body>
    <div id="chapter-nav">
      <button class="ch-btn" data-ch="0">📋 전체 개요</button>
      <button class="ch-btn ch-active" data-ch="1">Ch1. 기본 문법</button>
      <button class="ch-btn" data-ch="2">Ch2. OOP 기초</button>
      <button class="ch-btn" data-ch="3">Ch3. 컬렉션</button>
      <button class="ch-btn" data-ch="4">Ch4. 자료구조 응용</button>
      <button class="ch-btn" data-ch="5">Ch5. 람다·Stream·IO</button>
    </div>
    <div id="level-nav"></div>

    <div id="app"><div class="loading">진행 상황 불러오는 중...</div></div>

    <script>
      (function () {
        /* ============ 현재 챕터 상태 ============ */
        var currentCh = 1;
        var SERVER_URL = "http://localhost:3000/run";
        var serverAvailable = false;

        function checkServer() {
          fetch(SERVER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              code: 'public class Main { public static void main(String[] args) { System.out.println("ok"); } }',
            }),
            signal: AbortSignal.timeout(2000),
          })

          (q.topLevel || []).forEach(function (l) { lines.push(l); });
          if (q.userInputAtTopLevel) {
            userInput.split("\n").forEach(function (l) { lines.push(l); });
          }
          lines.push("public class Main {");
          (q.classLevel || []).forEach(function (l) {
            // inner class는 static이어야 static context(main/static 메서드)에서 사용 가능
            var line = /^\s*class\s/.test(l) ? "static " + l.trim() : l;
            lines.push("  " + line);
          });
          if (q.userInputAtClassLevel) {
            // 사용자 코드가 클래스 선언 등 class 레벨에 들어가야 하는 경우
            // inner class가 static context(main)에서 쓰이려면 static이 필요
            userInput.split("\n").forEach(function (l, i) {
              if (i === 0 && /^\s*class\s/.test(l)) {
                lines.push("  static " + l.trim());
              } else {
                lines.push("  " + l);
              }
            });
          }
          if (q.methodWrapper) {
            // methodWrapper: 배열 중 '~~~'를 기준으로 위는 메서드 시작, 아래는 메서드 끝
            // 사용자 코드가 class 레벨 메서드 안에 들어가야 하는 경우
            var hitMarker = false;
            q.methodWrapper.forEach(function (l) {
              if (l === "~~~") {

                userInput.split("\n").forEach(function (ul) {
                  lines.push("    " + ul);
                });
              } else {
                lines.push("  " + l);
              }
            });
          }
          lines.push(
            "  public static void main(String[] args) throws Exception {",
          );
          (q.before || []).forEach(function (l) {
            lines.push("    " + l);
          });
          if (!q.userInputAtClassLevel && !q.methodWrapper && !q.userInputAtTopLevel) {
            userInput.split("\n").forEach(function (l) {
              lines.push("    " + l);
            });
          }
          (q.after || []).forEach(function (l) {
            lines.push("    " + l);
          });
          lines.push("  }");
          lines.push("}");
          return lines.join("\n");

        /* ============ 에디터 보조 ============ */
        var BRACKET_OPEN_CLOSE = { "(": ")", "[": "]", "{": "}" };
        var BRACKET_CLOSE_CHARS = { ")": true, "]": true, "}": true };
        var QUOTE_CHARS = { '"': true, "'": true };
        var INDENT_UNIT = "    ";
        function lineBoundsOf(v, s, e) {
          var ls = v.lastIndexOf("\n", s - 1) + 1,
            le = v.indexOf("\n", e);
          if (le === -1) le = v.length;

        function indentSelection(ta, q) {
          var v = ta.value,
            s = ta.selectionStart,
            e = ta.selectionEnd;
          if (s === e) {
            ta.value = v.slice(0, s) + INDENT_UNIT + v.slice(s);
            ta.selectionStart = ta.selectionEnd = s + INDENT_UNIT.length;
            state.inputs[q.id] = ta.value;
            return;
          }
          var b = lineBoundsOf(v, s, e),
            lines = v.slice(b.lineStart, b.lineEnd).split("\n"),
            ind = lines
              .map(function (l) {
                return INDENT_UNIT + l;
              })
              .join("\n");
          ta.value = v.slice(0, b.lineStart) + ind + v.slice(b.lineEnd);
          ta.selectionStart = s + INDENT_UNIT.length;
          ta.selectionEnd = e + INDENT_UNIT.length * lines.length;
          state.inputs[q.id] = ta.value;
        }
        function outdentSelection(ta, q) {
          var v = ta.value,
            s = ta.selectionStart,
            e = ta.selectionEnd,
            b = lineBoundsOf(v, s, e),
            lines = v.slice(b.lineStart, b.lineEnd).split("\n"),
            removed = [],
            out = lines
              .map(function (l) {
                var m = l.match(/^( {1,4}|\t)/),
                  n = m ? m[0].length : 0;
                removed.push(n);
                return l.slice(n);
              })
              .join("\n");
          ta.value = v.slice(0, b.lineStart) + out + v.slice(b.lineEnd);
          var fr = removed[0] || 0,
            tr = removed.reduce(function (a, c) {
              return a + c;
            }, 0);
          ta.selectionStart = Math.max(b.lineStart, s - fr);
          ta.selectionEnd = Math.max(ta.selectionStart, e - tr);
          state.inputs[q.id] = ta.value;
        }
        function autoIndentNewline(ta, q) {
          var v = ta.value,
            pos = ta.selectionStart,
            ls = v.lastIndexOf("\n", pos - 1) + 1,
            cur = v.slice(ls, pos),
            im = cur.match(/^[ \t]*/),
            ind = im ? im[0] : "",
            lns = v.slice(0, pos).replace(/\s+$/, "").slice(-1),
            ex = lns === "{" ? INDENT_UNIT : "",
            ins = "\n" + ind + ex;
          ta.value = v.slice(0, pos) + ins + v.slice(pos);
          var np = pos + ins.length;
          ta.selectionStart = ta.selectionEnd = np;
          state.inputs[q.id] = ta.value;
        }
        function handleBracketKeydown(e, ta, q) {
          var key = e.key;
          if (e.ctrlKey || e.metaKey || e.altKey) return false;
          if (BRACKET_OPEN_CLOSE[key]) {
            var s = ta.selectionStart,
              en = ta.selectionEnd,
              v = ta.value,
              cl = BRACKET_OPEN_CLOSE[key];
            if (s !== en) {
              var sel = v.slice(s, en);
              ta.value = v.slice(0, s) + key + sel + cl + v.slice(en);
              ta.selectionStart = s + 1;
              ta.selectionEnd = en + 1;
            } else {
              ta.value = v.slice(0, s) + key + cl + v.slice(s);
              ta.selectionStart = ta.selectionEnd = s + 1;
            }
            state.inputs[q.id] = ta.value;
            e.preventDefault();
            return true;
          }
          if (QUOTE_CHARS[key]) {
            var s = ta.selectionStart,
              en = ta.selectionEnd,
              v = ta.value;
            if (s !== en) {
              var sel = v.slice(s, en);
              ta.value = v.slice(0, s) + key + sel + key + v.slice(en);
              ta.selectionStart = s + 1;
              ta.selectionEnd = en + 1;
              state.inputs[q.id] = ta.value;
              e.preventDefault();
              return true;
            }
            if (v[s] === key) {
              ta.selectionStart = ta.selectionEnd = s + 1;
              e.preventDefault();
              return true;
            }
            ta.value = v.slice(0, s) + key + key + v.slice(s);
            ta.selectionStart = ta.selectionEnd = s + 1;
            state.inputs[q.id] = ta.value;
            e.preventDefault();
            return true;
          }
          if (BRACKET_CLOSE_CHARS[key]) {

                (QUOTE_CHARS[pc] && pc === nc)

                ta.selectionStart = ta.selectionEnd = ss - 1;
                state.inputs[q.id] = ta.value;
                e.preventDefault();
                return true;
              }
            }
            return false;
          }

        /* ============ undo 스택 ============ */
        var undoStack = {}; // { [qid]: [{value, ss, se}] }

        function pushUndo(q, ta) {
          var id = q.id;
          if (!undoStack[id]) {
            undoStack[id] = [];
            undoPointer[id] = -1;

          var stack = undoStack[id];
          // 현재 포인터 이후 스택 제거
          stack.splice(undoPointer[id] + 1);
          stack.push({
            value: ta.value,
            ss: ta.selectionStart,
            se: ta.selectionEnd,
          });
          if (stack.length > 100) stack.shift();
          undoPointer[id] = stack.length - 1;
        }

        function doUndo(q, ta) {
          var id = q.id;
          if (!undoStack[id] || undoPointer[id] <= 0) return;
          undoPointer[id]--;
          var snap = undoStack[id][undoPointer[id]];
          ta.value = snap.value;
          ta.selectionStart = snap.ss;
          ta.selectionEnd = snap.se;
          state.inputs[id] = ta.value;
        }

        function scheduleUndo(q, ta) {

            '" data-action="toggle-bookmark-mode">🔖 즐겨찾기 <span style="font-family:var(--mono);font-size:10px;opacity:.7;">' +
            bmCount +
            "</span></button>";
          lnav.innerHTML = lhtml;
          var html = "";
          html +=
            '<div class="topbar"><div><div class="brand-eyebrow">$ run --suite ' +
            CHAPTER_DATA[currentCh].suite +
            '</div><h1 class="brand-title">' +
            CHAPTER_DATA[currentCh].brandTitle +
            "</h1></div>";
          html +=
            '<div class="top-stats"><button class="reset-btn" data-action="reset">진행 초기화</button></div></div>';
          html +=
            '<div class="card" style="text-align:center;padding:50px 24px;"><div class="card-title">' +
            title +
            "</div>";
          html +=
            '<p style="color:var(--muted);font-size:13.5px;margin:10px 0 18px;">전체 진행: ' +
            passed +
            " / " +
            QUESTIONS.length +
            "</p>";
          html +=
            '<button class="btn btn-grade" data-action="exit-review">전체 문제로 돌아가기</button></div>';
          app.innerHTML = html;
          updateServerBadge();
        }

        function render() {
          var app = document.getElementById("app");
          if (!state.loaded) {
            app.innerHTML =
              '<div class="loading">진행 상황 불러오는 중...</div>';
            return;
          }
          var levelQs = activeQuestionList();
          if (
            (state.reviewMode || state.bookmarkMode) &&
            levelQs.length === 0
          ) {
            renderEmptySpecial();
            return;
          }
          if (state.index >= levelQs.length) state.index = 0;
          var q = levelQs[state.index],
            passed = totalPassed(),
            html = "";

          html += '<div class="topbar"><div>';
          html +=
            '<div class="brand-eyebrow">$ run --suite ' +
            CHAPTER_DATA[currentCh].suite +
            "</div>";
          html +=
            '<h1 class="brand-title">' +
            CHAPTER_DATA[currentCh].brandTitle +
            "</h1>";
          html +=
            '<div class="brand-sub">코드를 입력하고 채점 버튼을 누르세요. <span id="server-badge" style="font-size:0.85em;">● regex 채점 (서버 꺼짐)</span></div>';
          html +=
            '<div class="kbd-hint"><kbd>Ctrl/Cmd</kbd>+<kbd>Enter</kbd> 채점 · <kbd>←</kbd><kbd>→</kbd> 이전/다음 문제 · <kbd>R</kbd> 정답 보기 · <kbd>Esc</kbd> 입력창 빠져나오기 · <kbd>Enter</kbd> 입력창 포커스</div>';
          html += '</div><div class="top-stats"><div class="progress-wrap">';
          html +=
            '<div class="progress-label"><span>전체 진행</span><b>' +
            passed +
            " / " +
            QUESTIONS.length +
            "</b></div>";
          html +=
            '<div class="progress-track"><div class="progress-fill" style="width:' +
            Math.round((passed / QUESTIONS.length) * 100) +
            '%"></div></div>';
          html +=
            '</div><button class="reset-btn" data-action="reset">진행 초기화</button></div></div>';

          /* --- level nav bar --- */
          var failCount = failedQuestions().length,
            bmCount = Object.keys(state.bookmarks).filter(function (k) {
              return state.bookmarks[k];
            }).length;
          var lnav = document.getElementById("level-nav"),
            lhtml = "";
          LEVELS.forEach(function (lv) {
            var p = levelPassed(lv.id),
              qs = questionsOfLevel(lv.id).length;
            var isActive =
              !state.reviewMode && !state.bookmarkMode && state.level === lv.id;
            var isDone = p === qs && qs > 0;
            lhtml +=
              '<button class="lv-btn' +
              (isDone ? " lv-done" : "") +
              (isActive ? " lv-active" : "") +
              '" data-action="select-level" data-level="' +
              lv.id +
              '">' +
              esc(lv.name) +
              ' <span style="font-family:var(--mono);font-size:10px;opacity:.7;">' +
              p +
              "/" +
              qs +
              "</span></button>";
          });
          lhtml += '<div class="lv-sep"></div>';
          lhtml +=
            '<button class="lv-btn lv-special' +
            (state.reviewMode ? " lv-on" : "") +
            '" data-action="toggle-review">📌 오답노트 <span style="font-family:var(--mono);font-size:10px;opacity:.7;">' +
            failCount +
            "</span></button>";
          lhtml +=
            '<button class="lv-btn lv-special' +
            (state.bookmarkMode ? " lv-on" : "") +
            '" data-action="toggle-bookmark-mode">🔖 즐겨찾기 <span style="font-family:var(--mono);font-size:10px;opacity:.7;">' +
            bmCount +
            "</span></button>";
          lnav.innerHTML = lhtml;

          html += '<div class="layout">';
          html += '<div class="dot-grid-wrap"><div class="dot-grid">';
          levelQs.forEach(function (qq, i) {
            var st = state.progress[qq.id] && state.progress[qq.id].status;
            var cls =
              "dot" +
              (i === state.index ? " current" : "") +
              (st === "pass" ? " pass" : st === "fail" ? " fail" : "") +
              (state.bookmarks[qq.id] ? " bookmarked" : "");
            html +=
              '<div class="' +
              cls +
              '" data-action="jump" data-index="' +
              i +
              '" title="' +
              esc(qq.id) +
              '">' +
              (st === "pass" ? "✓" : st === "fail" ? "✗" : i + 1) +
              "</div>";
          });
          html += "</div></div>";

          html += '<div class="content"><div class="card">';
          var eyebrow = state.reviewMode
            ? "📌 오답 노트 (복습 모드)"
            : state.bookmarkMode
              ? "🔖 즐겨찾기 모드"
              : esc(LEVELS[state.level].name);
          html +=
            '<div class="card-eyebrow">' +
            eyebrow +
            " · 문항 " +
            (state.index + 1) +
            " / " +
            levelQs.length +
            " · " +
            esc(q.id) +
            "</div>";
          html +=
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">';
          html +=
            '<h2 class="card-title" style="margin:0;">' +
            esc(q.title) +
            "</h2>";
          html +=
            '<button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;white-space:nowrap;" data-action="toggle-bookmark" data-qid="' +
            esc(q.id) +
            '">' +
            (state.bookmarks[q.id] ? "🔖 즐겨찾기 해제" : "☆ 즐겨찾기 추가") +
            "</button></div>";
          if (state.reviewMode || state.bookmarkMode)
            html +=
              '<button class="btn btn-ghost" style="align-self:flex-start;padding:5px 10px;font-size:12px;" data-action="exit-review">← 전체 문제로 돌아가기</button>';
          html +=
            '<div class="concept"><b>핵심 개념</b> — ' +
            esc(q.concept) +
            "</div>";
          html += '<div class="codebox">';
          q.before.forEach(function (l) {
            html += '<div class="cl muted">' + esc(l) + "</div>";
          });
          q.placeholder.forEach(function (l) {
            html += '<div class="cl muted">' + esc(l) + "</div>";
          });
          var savedInput =
            state.inputs[q.id] !== undefined
              ? state.inputs[q.id]
              : (state.progress[q.id] && state.progress[q.id].input) || "";
          html +=
            '<textarea class="blank" id="ans-input" rows="' +
            (q.rows || 5) +
            '" placeholder="여기에 코드를 입력하세요"></textarea>';
          q.after.forEach(function (l) {
            html += '<div class="cl muted">' + esc(l) + "</div>";
          });
          html += "</div>";
          html +=
            '<div class="expected">기대 출력: <code>' +
            esc(q.expected) +
            "</code></div>";
          var fb = state.progress[q.id],
            fbClass = "",
            fbText = "";
          var lastLog = state.log.filter(function (l) {
            return l.cmd === "check " + q.id;
          });
          var lastOutput = lastLog.length
            ? lastLog[lastLog.length - 1].output
            : null;
          if (fb && fb.status === "pass") {
            fbClass = "pass show";
            fbText = "✓ PASS — 정답입니다.";
          } else if (fb && fb.status === "fail") {
            fbClass = "fail show";
            fbText = "✗ FAIL — 문법을 다시 확인해보세요.";
          }
          var outputHtml = "";
          if (lastOutput !== null && lastOutput !== undefined) {
            outputHtml =
              '<div class="output-box">' +
              '<span class="output-label">출력</span>' +
              '<pre class="output-val">' +
              esc(lastOutput) +
              "</pre>" +
              "</div>";
          }
          html +=
            '<div class="actions"><button class="btn btn-grade" data-action="grade">채점</button>';
          html +=
            '<button class="btn btn-ghost" data-action="reveal">' +
            (state.revealed[q.id] ? "정답 숨기기" : "정답 보기") +
            "</button></div>";
          html +=
            '<div class="feedback ' +
            fbClass +
            '" id="fb-msg">' +
            fbText +
            "</div>";
          html += outputHtml;
          html +=
            '<div class="answer-box' +
            (state.revealed[q.id] ? " show" : "") +
            '">';
          html += '<div class="lbl">🔍 정답</div>';
          q.answer.forEach(function (l) {
            html += '<div class="al">' + esc(l) + "</div>";
          });
          if (q.note) html += '<div class="note">' + esc(q.note) + "</div>";
          html += "</div>";
          html += '<div class="nav-row">';
          html +=
            '<button class="btn btn-nav" data-action="prev" ' +
            (state.index === 0 ? "disabled" : "") +
            ">← 이전</button>";
          html +=
            '<span class="pos">' +
            (state.index + 1) +
            " / " +
            levelQs.length +
            "</span>";
          html +=
            '<button class="btn btn-nav" data-action="next" ' +
            (state.index === levelQs.length - 1 ? "disabled" : "") +
            ">다음 →</button>";
          html += "</div></div></div>";

          app.innerHTML = html;
          updateServerBadge();
          var ta = document.getElementById("ans-input");
          if (ta) {
            function autoResize() {
              ta.style.height = "auto";
              ta.style.height = ta.scrollHeight + "px";
            }
            ta.value = savedInput;
            autoResize();
            pushUndo(q, ta);
            ta.addEventListener("input", function () {
              state.inputs[q.id] = ta.value;
              scheduleUndo(q, ta);
              autoResize();
            });
            ta.addEventListener("keydown", function (e) {
              handleEditorKeydown(e, ta, q);
            });
          }
        }

        /* ============ 액션 ============ */
        function doSelectLevel(lv) {
          state.reviewMode = false;
          state.bookmarkMode = false;
          state.level = lv;
          state.index = 0;
          savePosition();
          render();
        }
        function doToggleReview() {
          state.reviewMode = !state.reviewMode;
          if (state.reviewMode) state.bookmarkMode = false;
          state.index = 0;
          render();
        }
        function doToggleBookmarkMode() {
          state.bookmarkMode = !state.bookmarkMode;
          if (state.bookmarkMode) state.reviewMode = false;
          state.index = 0;
          render();
        }
        function doExitSpecialMode() {
          state.reviewMode = false;
          state.bookmarkMode = false;
          state.index = 0;
          render();
        }
        function doJump(i) {
          state.index = i;
          savePosition();
          render();
        }
        function doPrev() {
          if (state.index > 0) {
            state.index--;
            savePosition();
            render();
          }
        }
        function doNext() {
          var lq = activeQuestionList();
          if (state.index < lq.length - 1) {
            state.index++;
            savePosition();
            render();
          }
        }
        function doReveal() {
          var lq = activeQuestionList(),
            q = lq[state.index];
          if (!q) return;
          state.revealed[q.id] = !state.revealed[q.id];
          render();
        }
        function doToggleBookmark(qid) {
          if (!qid) return;
          if (state.bookmarks[qid]) delete state.bookmarks[qid];
          else state.bookmarks[qid] = true;
          saveBookmarks();
          render();
        }
        async function doGrade() {
          var lq = activeQuestionList(),
            q = lq[state.index];
          if (!q) return;
          var ta = document.getElementById("ans-input"),
            val = ta ? ta.value : "";
          var gradeBtn = document.querySelector('[data-action="grade"]');
          if (gradeBtn) {
            gradeBtn.disabled = true;
            gradeBtn.textContent = "채점 중...";
          }
          var executionOutput = null;
          var pass;
          if (serverAvailable) {
            var result = await gradeByExecution(q, val);
            if (result !== null) {
              pass = result.pass;
              executionOutput = result.output;
            } else {
              pass = gradeQuestion(q, val);
            }
          } else {
            pass = gradeQuestion(q, val);
          }
          if (gradeBtn) {
            gradeBtn.disabled = false;
            gradeBtn.textContent = "채점";
          }
          state.progress[q.id] = { status: pass ? "pass" : "fail", input: val };
          pushLog(q.id, pass, executionOutput);
          saveProgress();
          render();
        }
        function doReset() {
          if (
            window.confirm("모든 진행 상황을 초기화할까요? 되돌릴 수 없습니다.")
          ) {
            state.progress = {};
            state.inputs = {};
            state.revealed = {};
            state.log = [];
            state.reviewMode = false;
            saveProgress();
            render();
          }
        }
        function focusAnswerInput() {
          var ta = document.getElementById("ans-input");
          if (ta) ta.focus();
        }

        /* ============ 이벤트 ============ */
        function handleAction(el) {
          var action = el.getAttribute("data-action");
          if (action === "select-level")
            doSelectLevel(parseInt(el.getAttribute("data-level"), 10));
          else if (action === "toggle-review") doToggleReview();
          else if (action === "toggle-bookmark-mode") doToggleBookmarkMode();
          else if (action === "exit-review") doExitSpecialMode();
          else if (action === "jump")
            doJump(parseInt(el.getAttribute("data-index"), 10));
          else if (action === "prev") doPrev();
          else if (action === "next") doNext();
          else if (action === "reveal") doReveal();
          else if (action === "toggle-bookmark")
            doToggleBookmark(el.getAttribute("data-qid"));
          else if (action === "grade") doGrade();
          else if (action === "reset") doReset();
          else if (action === "go-chapter") {
            var ch = parseInt(el.getAttribute("data-ch"), 10);
            isOverview = false;
            switchChapter(ch);
          }
        }
        document
          .getElementById("level-nav")
          .addEventListener("click", function (e) {
            var el = e.target.closest("[data-action]");
            if (!el) return;
            handleAction(el);
          });
        document.getElementById("app").addEventListener("click", function (e) {
          var el = e.target.closest("[data-action]");
          if (!el) return;
          handleAction(el);
        });

        document.addEventListener("keydown", function (e) {
          var ta = document.getElementById("ans-input"),
            taf = document.activeElement === ta;
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            doGrade();
            return;
          }
          if (taf) {
            if (e.key === "Escape") {
              e.preventDefault();
              ta.blur();
            }
            return;
          }
          if (e.key === "Enter") {
            e.preventDefault();
            focusAnswerInput();
          } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            doPrev();
          } else if (e.key === "ArrowRight") {
            e.preventDefault();
            doNext();
          } else if (e.key === "r" || e.key === "R") {
            e.preventDefault();
            doReveal();
          }
        });

        /* ============ 시작 ============ */
        loadPosition();
        render();
        loadProgress().then(render);
        checkServer();
      })();
    </script>
  </body>
</html>
