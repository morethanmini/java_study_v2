<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java 문법 채점기</title>
    <link rel="icon" type="image/png" href="icon/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="ch1-basic-syntax/items/levels.js"></script>
    <script src="ch1-basic-syntax/items/questions.js"></script>
    <script src="ch2-oop/items/levels.js"></script>
    <script src="ch2-oop/items/questions.js"></script>
    <script src="ch3-collections/items/levels.js"></script>
    <script src="ch3-collections/items/questions.js"></script>
    <script src="ch4-data-structures/items/levels.js"></script>
    <script src="ch4-data-structures/items/questions.js"></script>
    <script src="ch5-lambda-stream-io/items/levels.js"></script>
    <script src="ch5-lambda-stream-io/items/questions.js"></script>
  </head>
  <body>
    <div id="page-wrap">
      <div id="lv-tooltip"></div>
      <nav id="sidebar">
        <div id="sidebar-header">
          <button id="sidebar-pin" title="사이드바 고정/해제">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
          </button>
          <div class="sidebar-brand-wrap">
            <div class="sidebar-brand">Java 문법 채점기</div>
            <div class="sidebar-sub">$ java --curriculum</div>
          </div>
        </div>
        <div id="sidebar-overview">
          <button class="ch-btn" data-ch="0"><span class="ch-icon">📋</span><span class="ch-text">전체 개요<span class="ov-pct"></span></span></button>
        </div>
        <div class="sidebar-divider"></div>
        <div id="sidebar-daily">
          <button class="ch-btn" data-ch="-1"><span class="ch-icon">📅</span><span class="ch-text">데일리 문제<span class="daily-badge"></span></span></button>
        </div>
        <div class="sidebar-divider"></div>
        <div id="sidebar-section-label">챕터</div>
        <div id="chapter-nav">
          <button class="ch-btn ch-active" data-ch="1"><span class="ch-icon">①</span><span class="ch-text">기본 문법</span></button>
          <button class="ch-btn" data-ch="2"><span class="ch-icon">②</span><span class="ch-text">OOP 기초</span></button>
          <button class="ch-btn" data-ch="3"><span class="ch-icon">③</span><span class="ch-text">컬렉션</span></button>
          <button class="ch-btn" data-ch="4"><span class="ch-icon">④</span><span class="ch-text">자료구조 응용</span></button>
          <button class="ch-btn" data-ch="5"><span class="ch-icon">⑤</span><span class="ch-text">람다·Stream·IO</span></button>
        </div>
        <div id="level-nav"></div>
        <div id="sidebar-footer">
          <div id="grass-wrap">
            <div class="grass-label">학습 잔디</div>
            <div class="grass-chart">
              <div class="grass-y-axis">
                <span></span><span>월</span><span></span><span>수</span><span></span><span>금</span><span></span>
              </div>
              <div class="grass-col-wrap">
                <div id="grass-x-axis"></div>
                <div id="grass-grid"></div>
              </div>
            </div>
            <div id="grass-tooltip"></div>
          </div>
          <button class="ch-reset-btn" data-action="reset-all"><span class="ch-icon">🗑</span><span class="ch-text">전체 초기화</span></button>
        </div>
      </nav>
      <div id="main-wrap">
        <div id="app"><div class="loading">진행 상황 불러오는 중...</div></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
