<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java 문법 채점기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f0f4f8;
        --surface: #ffffff;
        --surface2: #e8eff6;
        --code-bg: #f5f8fb;
        --border: #c9d8e8;
        --border-soft: #d8e6f0;
        --accent-hard: #89097e;
        --accent: #2e86c1;
        --accent-soft: #4da3d4;
        --success: #1a8a56;
        --fail: #c0392b;
        --text: #1a2733;
        --muted: #5d7a8a;
        --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
        --display: "Space Grotesk", sans-serif;
        --body: "Inter", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
      }

      /* ---------- page layout ---------- */
      #page-wrap {
        min-height: 100vh;
      }
      #sidebar {
        position: fixed;
        left: 0; top: 0;
        height: 100vh;
        width: 52px;
        z-index: 200;
        background: #f9fafb;
        border-right: 1px solid rgba(0,0,0,0.07);
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
        transition: width 0.22s ease, box-shadow 0.22s ease;
      }
      #sidebar::-webkit-scrollbar { display: none; }
      #sidebar:hover {
        width: 216px;
        box-shadow: 4px 0 20px rgba(0,0,0,0.1);
      }
      #sidebar.pinned {
        width: 216px;
        box-shadow: none;
      }
      #sidebar-header {
        padding: 12px 10px 10px;
        border-bottom: 1px solid var(--border-soft);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 52px;
      }
      .sidebar-brand-wrap {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }
      .sidebar-brand {
        font-family: var(--display);
        font-weight: 700;
        font-size: 14px;
        color: var(--text);
        line-height: 1.3;
        white-space: nowrap;
      }
      .sidebar-sub {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        margin-top: 2px;
        white-space: nowrap;
      }
      #sidebar-pin {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.1s, color 0.1s;
      }
      #sidebar-pin:hover { background: rgba(0,0,0,0.06); color: var(--text); }
      #sidebar.pinned #sidebar-pin {
        background: rgba(46,134,193,0.12);
        color: var(--accent);
      }

      /* overview 전용 섹션 */
      #sidebar-overview {
        padding: 8px 8px 6px;
        flex-shrink: 0;
      }
      .sidebar-divider {
        height: 1px;
        background: var(--border);
        margin: 0 8px;
        flex-shrink: 0;
      }
      #sidebar-section-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 8px 14px 4px;
        flex-shrink: 0;
        white-space: nowrap;
      }
      #sidebar-levels-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 8px 14px 4px;
        border-top: 1px solid var(--border-soft);
        flex-shrink: 0;
        white-space: nowrap;
      }
      #sidebar-footer {
        margin-top: auto;
        padding: 10px 8px;
        border-top: 1px solid var(--border-soft);
        flex-shrink: 0;
      }
      #main-wrap {
        margin-left: 52px;
        min-height: 100vh;
        transition: margin-left 0.22s ease;
      }
      #sidebar.pinned ~ #main-wrap {
        margin-left: 216px;
      }

      /* ch-icon: 항상 보이는 아이콘 */
      .ch-icon {
        flex-shrink: 0;
        font-size: 13px;
        width: 18px;
        text-align: center;
        display: inline-block;
      }
      .ch-text {
        flex: 1;
        overflow: hidden;
        white-space: nowrap;
      }

      /* 아코디언: level-nav가 chapter-nav 안에 들어갔을 때 기본 숨김 */
      #chapter-nav #level-nav {
        display: none;
      }
      #sidebar:hover #chapter-nav #level-nav,
      #sidebar.pinned #chapter-nav #level-nav {
        display: flex;
        flex-direction: column;
        padding: 2px 4px 4px 22px;
        border-left: 2px solid rgba(0,0,0,0.06);
        margin-left: 12px;
        margin-bottom: 2px;
      }

      /* 좁은 상태(hover/pin 아닐 때) 텍스트·레이블 숨김 */
      #sidebar-section-label,
      .sidebar-divider,
      .ch-text {
        visibility: hidden;
        transition: visibility 0s 0.1s;
      }
      #sidebar:hover #sidebar-section-label,
      #sidebar:hover .sidebar-divider,
      #sidebar:hover .ch-text,
      #sidebar.pinned #sidebar-section-label,
      #sidebar.pinned .sidebar-divider,
      #sidebar.pinned .ch-text {
        visibility: visible;
        transition: visibility 0s 0.08s;
      }

      /* ---------- chapter nav ---------- */
      #chapter-nav {
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 4px 8px;
        flex-shrink: 0;
      }
      .ch-reset-btn {
        width: 100%;
        font-family: var(--body);
        font-size: 12px;
        color: var(--muted);
        background: transparent;
        border: none;
        border-radius: 4px;
        padding: 5px 8px;
        cursor: pointer;
        transition: background 0.1s, color 0.1s;
        white-space: nowrap;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .ch-reset-btn:hover { background: rgba(192,57,43,0.07); color: var(--fail); }
      .lv-reset-btn {
        width: 100%;
        font-family: var(--body);
        font-size: 12px;
        color: var(--muted);
        background: transparent;
        border: none;
        border-radius: 4px;
        padding: 5px 8px;
        cursor: pointer;
        transition: background 0.1s, color 0.1s;
        white-space: nowrap;
        text-align: left;
      }
      .lv-reset-btn:hover { background: rgba(192,57,43,0.07); color: var(--fail); }
      .ch-btn {
        font-family: var(--body);
        font-size: 13px;
        font-weight: 400;
        background: transparent;
        border: none;
        border-radius: 4px;
        color: var(--muted);
        padding: 5px 8px;
        cursor: pointer;
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 2px;
        transition: background 0.1s, color 0.1s;
        white-space: nowrap;
      }
      .ch-btn:hover {
        background: rgba(0,0,0,0.05);
        color: var(--text);
      }
      .ch-btn.ch-active {
        background: rgba(0,0,0,0.07);
        color: var(--text);
        font-weight: 600;
      }
      .ch-btn.ch-done {
        color: #2471a3;
      }
      .ch-btn.ch-done.ch-active {
        background: rgba(46,134,193,0.1);
        color: #1a4a6b;
        font-weight: 600;
      }
      /* 전체 개요 버튼: 활성 상태 */
      .ch-btn[data-ch="0"].ch-active {
        background: rgba(46,134,193,0.08);
        color: var(--accent);
        font-weight: 600;
      }
      /* 전체 개요 버튼 liquid fill wave */
      .ch-btn[data-ch="0"] {
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .ch-btn[data-ch="0"] .ch-icon,
      .ch-btn[data-ch="0"] .ch-text {
        position: relative;
        z-index: 2;
        white-space: nowrap;
      }
      .ch-btn[data-ch="0"] .ov-pct {
        font-size: 10px;
        font-weight: 700;
        opacity: 0.8;
        letter-spacing: 0;
        color: var(--accent);
      }
      /* SVG가 fill+wave를 담당 — shimmer만 ::before로 오버레이 */
      .ch-btn[data-ch="0"] .ov-wave-svg {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 0;
      }
      .ch-btn[data-ch="0"]::before {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
        background-size: 200% 100%;
        z-index: 1;
        pointer-events: none;
        animation: shimmer 2.4s linear infinite;
      }
      @keyframes shimmer {
        from { background-position: -100% 0; }
        to   { background-position:  100% 0; }
      }

      #app {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 32px 60px;
      }
      #app > .topbar + * { margin-top: 28px; }

      /* ---------- topbar ---------- */
      .topbar {
        display: flex;
        flex-direction: column;
        padding: 24px 0 0;
      }
      .topbar-main {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 10px;
      }
      .topbar-left { display: flex; flex-direction: column; gap: 0; flex: 1; min-width: 0; }
      .top-stats-box {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        padding-top: 25px;
      }
      .top-stats-box .progress-wrap { min-width: 180px; }
      .topbar-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 8px 0 12px;
        border-bottom: 1px solid var(--border);
      }
      .top-qnav {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .q-nav {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
      }
      .q-nav-arrow {
        width: 28px; height: 30px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--muted);
        font-size: 15px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: 0.12s;
        line-height: 1;
        padding: 0;
        flex-shrink: 0;
      }
      .q-nav-arrow:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
      .q-nav-arrow:disabled { opacity: 0.3; cursor: default; }
      /* fixed width: 6 × 32px + 5 × 5px gap = 217px */
      .q-nav-dots { display: flex; gap: 5px; width: 217px; flex-shrink: 0; }
      .brand-eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.14em;
        color: var(--accent-soft);
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .brand-title {
        font-family: var(--display);
        font-weight: 700;
        font-size: 30px;
        letter-spacing: -0.02em;
        margin: 0 0 6px;
        line-height: 1.1;
      }
      .brand-sub {
        color: var(--muted);
        font-size: 13.5px;
        margin-bottom: 3px;
      }
      .top-qnav {
        display: flex;
        align-items: center;
        flex-shrink: 0;
        padding-top: 4px;
      }
      .progress-wrap {
        min-width: 240px;
      }
      .progress-label {
        display: flex;
        justify-content: space-between;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 7px;
      }
      .progress-label b {
        color: var(--text);
        font-weight: 600;
      }
      .progress-track {
        height: 6px;
        border-radius: 99px;
        background: var(--surface2);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-soft));
        transition: width 0.3s ease;
      }
      .reset-btn {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0 10px;
        height: 30px;
        cursor: pointer;
        transition: 0.15s;
        white-space: nowrap;
        display: flex;
        align-items: center;
      }
      .reset-btn:hover {
        border-color: var(--fail);
        color: var(--fail);
      }

      /* ---------- level nav ---------- */
      #level-nav {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 4px 8px;
        flex-shrink: 0;
        overflow: hidden;
        max-height: 600px;
        transition: max-height 0.45s ease-in-out, opacity 0.45s ease-in-out, padding 0.45s ease-in-out;
        opacity: 1;
      }
      #level-nav.lnav-collapsed {
        max-height: 0;
        opacity: 0;
        padding-top: 0;
        padding-bottom: 0;
      }
      #level-nav.lnav-no-transition {
        transition: none !important;
      }
      .lv-btn {
        font-family: var(--body);
        font-size: 12px;
        font-weight: 400;
        background: transparent;
        border: none;
        border-radius: 4px;
        color: var(--muted);
        padding: 5px 8px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: background 0.1s, color 0.1s;
        width: 100%;
        text-align: left;
      }
      .lv-btn:hover {
        background: rgba(0,0,0,0.05);
        color: var(--text);
      }
      .lv-btn.lv-active {
        background: rgba(0,0,0,0.07);
        color: var(--text);
        font-weight: 600;
      }
      .lv-btn.lv-done {
        background: rgba(26,138,86,0.08);
        color: var(--text);
      }
      .lv-btn.lv-done.lv-active {
        background: rgba(26,138,86,0.14);
        color: var(--text);
        font-weight: 600;
      }
      .lv-btn.lv-special {
        color: var(--muted);
      }
      .lv-btn.lv-special.lv-on {
        background: rgba(46,134,193,0.08);
        color: var(--accent);
        font-weight: 600;
      }
      .lv-sep {
        height: 1px;
        width: 100%;
        background: var(--border);
        margin: 4px 0;
      }

      /* ---------- layout ---------- */
      .layout {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .dot-grid-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
      }

      .dot-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
        gap: 6px;
      }
      .dot {
        width: 32px; height: 30px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        cursor: pointer;
        transition: 0.15s;
        flex-shrink: 0;
      }
      .dot:hover {
        border-color: var(--accent-soft);
      }
      .dot.current {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .dot.pass {
        background: rgba(111, 217, 160, 0.14);
        border-color: var(--success);
        color: var(--text);
      }
      .dot.fail {
        background: rgba(226, 96, 79, 0.14);
        border-color: var(--fail);
        color: var(--fail);
      }
      .dot.bookmarked {
        outline: 2px solid var(--accent-soft);
        outline-offset: 1px;
      }
      .dot.dot-empty {
        border-color: transparent;
        background: transparent;
        pointer-events: none;
        cursor: default;
      }

      .kbd-hint {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        opacity: 0.75;
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .kbd-hint kbd {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--text);
      }

      /* ---------- question card ---------- */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .card-eyebrow {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent-soft);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .card-title {
        font-family: var(--display);
        font-size: 21px;
        font-weight: 600;
        margin: 0;
      }
      .concept {
        background: var(--surface2);
        border-left: 3px solid var(--accent);
        border-radius: 0 8px 8px 0;
        padding: 10px 14px;
        font-size: 13.5px;
        line-height: 1.6;
        color: var(--text);
      }
      .concept b {
        color: var(--accent-soft);
      }
      .codebox {
        background: var(--code-bg);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 14px 16px;
        font-family: var(--mono);
        font-size: 13.5px;
        line-height: 1.7;
      }
      .cl {
        white-space: pre-wrap;
        color: var(--text);
      }
      .cl.muted {
        color: var(--muted);
      }
      .blank {
        width: 100%;
        resize: none;
        overflow: hidden;
        background: #deeaf4;
        border: 1px dashed var(--accent-soft);
        border-radius: 6px;
        color: var(--accent-hard);
        font-family: "Roboto Mono", var(--mono);
        font-size: 13.5px;
        padding: 8px 10px;
        margin: 4px 0;
        outline: none;
      }
      .blank:focus {
        border-style: solid;
        border-color: var(--accent);
      }
      .expected {
        font-family: var(--mono);
        font-size: 12.5px;
        color: var(--muted);
      }
      .expected code {
        color: var(--accent-soft);
        background: none;
        white-space: pre;
        display: inline-block;
        vertical-align: top;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .btn {
        font-family: var(--body);
        font-weight: 600;
        font-size: 13px;
        border-radius: 8px;
        padding: 9px 16px;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: 0.15s;
      }
      .btn-grade {
        background: var(--accent);
        border-color: var(--accent);
        color: #191309;
      }
      .btn-grade:hover {
        background: var(--accent-soft);
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--accent-soft);
      }
      .btn-nav {
        background: var(--surface2);
        color: var(--text);
      }
      .btn-nav:hover {
        border-color: var(--accent-soft);
      }
      .btn-nav:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .feedback {
        font-family: var(--mono);
        font-size: 13px;
        border-radius: 8px;
        padding: 9px 12px;
        display: none;
      }
      .feedback.show {
        display: block;
      }
      .feedback.pass {
        background: rgba(111, 217, 160, 0.12);
        color: var(--success);
        border: 1px solid rgba(111, 217, 160, 0.3);
      }
      .feedback.fail {
        background: rgba(226, 96, 79, 0.12);
        color: var(--fail);
        border: 1px solid rgba(226, 96, 79, 0.3);
      }
      .output-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 12px;
        font-family: var(--mono);
        font-size: 13px;
      }
      .output-label {
        font-size: 11px;
        color: var(--accent-soft);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        display: block;
        margin-bottom: 4px;
      }
      .output-val {
        margin: 0;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-all;
      }
      .answer-box {
        display: none;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .answer-box.show {
        display: block;
      }
      .answer-box .lbl {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--accent-soft);
        margin-bottom: 8px;
        letter-spacing: 0.06em;
      }
      .answer-box .al {
        font-family: "Roboto Mono", var(--mono);
        font-size: 13.5px;
        color: var(--text);
        white-space: pre-wrap;
      }

      /* ---------- terminal log ---------- */
      .terminal {

      /* ---------- overview wave bar ---------- */
      .ov-wave-wrap {

        position: relative;

        border-radius: 99px;

      .ov-wave-fill {
        position: absolute;
        top: 0; left: 0;

        overflow: hidden;

      /* 물결: fill 위에 SVG 패턴을 clip처럼 씌움 */
      .ov-wave-fill::after {
        content: '';
        position: absolute;
        right: -60px;
        top: -10px;
        width: 120px;
        height: 48px;
        background: var(--bg);
        border-radius: 40%;
        animation: wave 1.6s ease-in-out infinite;

      @keyframes wave {

    <script>
      (function () {
        /* ============ 현재 챕터 상태 ============ */
        var currentCh = 1;
        var chCollapsed = false;
        var SERVER_URL = "http://localhost:3000/run";
        var serverAvailable = false;

        function checkServer() {
          fetch(SERVER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              code: 'public class Main { public static void main(String[] args) { System.out.println("ok"); } }',
            }),
            signal: AbortSignal.timeout(2000),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              serverAvailable = d.output === "ok";
              updateServerBadge();
            })
            .catch(function () {
              serverAvailable = false;
              updateServerBadge();
            });
        }

        function updateServerBadge() {
          var badge = document.getElementById("server-badge");
          if (!badge) return;
          badge.textContent = serverAvailable
            ? "● 실행 채점"
            : "● regex 채점 (서버 꺼짐)";
          badge.style.color = serverAvailable ? "#4caf50" : "#aaa";
        }

        function buildJavaCode(q, userInput) {
          var lines = [];
          lines.push("import java.io.*;");
          lines.push("import java.util.*;");
          lines.push("import java.util.stream.*;");
          lines.push("import java.lang.annotation.*;");
          (q.topLevel || []).forEach(function (l) { lines.push(l); });
          if (q.userInputAtTopLevel) {
            userInput.split("\n").forEach(function (l) { lines.push(l); });
          }
          lines.push("public class Main {");
          (q.classLevel || []).forEach(function (l) {
            // inner class는 static이어야 static context(main/static 메서드)에서 사용 가능
            var line = /^\s*class\s/.test(l) ? "static " + l.trim() : l;
            lines.push("  " + line);
          });
          if (q.userInputAtClassLevel) {
            // 사용자 코드가 클래스 선언 등 class 레벨에 들어가야 하는 경우
            // inner class가 static context(main)에서 쓰이려면 static이 필요
            userInput.split("\n").forEach(function (l, i) {
              if (i === 0 && /^\s*class\s/.test(l)) {
                lines.push("  static " + l.trim());
              } else {
                lines.push("  " + l);
              }
            });
          }
          if (q.methodWrapper) {
            // methodWrapper: 배열 중 '~~~'를 기준으로 위는 메서드 시작, 아래는 메서드 끝
            // 사용자 코드가 class 레벨 메서드 안에 들어가야 하는 경우
            var hitMarker = false;
            q.methodWrapper.forEach(function (l) {
              if (l === "~~~") {
                hitMarker = true;
                userInput.split("\n").forEach(function (ul) {
                  lines.push("    " + ul);
                });
              } else {
                lines.push("  " + l);
              }
            });
          }
          lines.push(
            "  public static void main(String[] args) throws Exception {",
          );
          (q.before || []).forEach(function (l) {
            lines.push("    " + l);
          });
          if (!q.userInputAtClassLevel && !q.methodWrapper && !q.userInputAtTopLevel) {
            userInput.split("\n").forEach(function (l) {
              lines.push("    " + l);
            });
          }
          (q.after || []).forEach(function (l) {
            lines.push("    " + l);
          });
          lines.push("  }");
          lines.push("}");
          return lines.join("\n");
        }

        function gradeByExecution(q, input) {
          return fetch(SERVER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: buildJavaCode(q, input) }),
            signal: AbortSignal.timeout(5000),
          })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              var out = d.output ? d.output.trim() : "";
              var err = d.error ? d.error.trim() : "";
              if (!out && err)
                return { pass: false, output: "⚠ " + err.split("\n")[0] };
              return { pass: out === String(q.expected).trim(), output: out };
            })
            .catch(function () {
              return null;
            });
        }
        var LEVELS = CHAPTER_DATA[1].levels;
        var QUESTIONS = CHAPTER_DATA[1].questions;
        var STORAGE_KEY = CHAPTER_DATA[1].storageKey;
        var BOOKMARK_KEY = CHAPTER_DATA[1].bookmarkKey;

        /* ============ 전체개요 버튼 SVG 물결 (동기 초기화) ============ */
        (function () {
          var btn = document.querySelector('.ch-btn[data-ch="0"]');
          if (!btn) return;
          var ns = 'http://www.w3.org/2000/svg';
          var svg = document.createElementNS(ns, 'svg');
          svg.setAttribute('class', 'ov-wave-svg');
          svg.setAttribute('preserveAspectRatio', 'none');
          var wavePath = document.createElementNS(ns, 'path');
          wavePath.setAttribute('fill', 'rgba(77,163,212,0.45)');
          svg.appendChild(wavePath);
          btn.insertBefore(svg, btn.firstChild);
          var phase = 0;
          function tick() {
            var W = btn.offsetWidth, H = btn.offsetHeight;
            var pctStr = btn.style.getPropertyValue('--ch-pct');
            var fillX = W * (parseFloat(pctStr) || 0) / 100;
            var amp = 5, period = H * 1.6, steps = 30;
            var d = 'M0,0 L' + fillX + ',0 ';
            for (var i = 0; i <= steps; i++) {
              var y = (i / steps) * H;
              var x = fillX + Math.sin((y / period) * Math.PI * 2 + phase) * amp;
              d += 'L' + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
            }
            d += 'L0,' + H + ' Z';
            wavePath.setAttribute('d', d);
            phase -= 0.04;
          }
          setInterval(tick, 16);
        })();

        /* ============ 앱 상태 ============ */
        var state = {
          loaded: false,
          progress: {},
          inputs: {},
          revealed: {},
          bookmarks: {},
          level: 0,
          index: 0,
          log: [],
          reviewMode: false,
          bookmarkMode: false,
        };

        /* ============ 저장소 ============ */
        var store = {
          get: function (key) {
            if (window.storage && window.storage.get) {
              return window.storage.get(key, false).then(function (res) {
                return res && res.value ? res.value : null;
              });
            }
            return Promise.resolve(localStorage.getItem(key));
          },
          set: function (key, val) {
            if (window.storage && window.storage.set)
              return window.storage.set(key, val, false);
            try {
              localStorage.setItem(key, val);
            } catch (e) {}
            return Promise.resolve();
          },
        };

        async function loadProgress() {
          try {
            var v = await store.get(STORAGE_KEY);
            if (v) state.progress = JSON.parse(v) || {};
          } catch (e) {
            state.progress = {};
          }
          try {
            var b = await store.get(BOOKMARK_KEY);
            if (b) state.bookmarks = JSON.parse(b) || {};
          } catch (e) {
            state.bookmarks = {};
          }
          state.loaded = true;
        }
        async function saveProgress() {
          try {
            await store.set(STORAGE_KEY, JSON.stringify(state.progress));
          } catch (e) {}
          updateChDoneBadges();
        }
        function savePosition() {
          try {
            localStorage.setItem(
              "java_study_pos",
              JSON.stringify({
                ch: currentCh,
                level: state.level,
                index: state.index,
              }),
            );
          } catch (e) {}
        }
        function loadPosition() {
          try {
            var pos = JSON.parse(localStorage.getItem("java_study_pos"));
            if (!pos || !CHAPTER_DATA[pos.ch]) return;
            if (pos.ch !== currentCh) switchChapter(pos.ch);
            state.level = pos.level || 0;
            state.index = pos.index || 0;
          } catch (e) {}
        }

        /* ============ 에디터 보조 ============ */
        var BRACKET_OPEN_CLOSE = { "(": ")", "[": "]", "{": "}" };
        var BRACKET_CLOSE_CHARS = { ")": true, "]": true, "}": true };
        var QUOTE_CHARS = { '"': true, "'": true };
        var INDENT_UNIT = "    ";
        function lineBoundsOf(v, s, e) {
          var ls = v.lastIndexOf("\n", s - 1) + 1,
            le = v.indexOf("\n", e);
          if (le === -1) le = v.length;
          return { lineStart: ls, lineEnd: le };
        }
        function indentSelection(ta, q) {
          var v = ta.value,
            s = ta.selectionStart,
            e = ta.selectionEnd;
          if (s === e) {
            ta.value = v.slice(0, s) + INDENT_UNIT + v.slice(s);
            ta.selectionStart = ta.selectionEnd = s + INDENT_UNIT.length;
            state.inputs[q.id] = ta.value;
            return;
          }
          var b = lineBoundsOf(v, s, e),
            lines = v.slice(b.lineStart, b.lineEnd).split("\n"),
            ind = lines
              .map(function (l) {
                return INDENT_UNIT + l;
              })
              .join("\n");
          ta.value = v.slice(0, b.lineStart) + ind + v.slice(b.lineEnd);
          ta.selectionStart = s + INDENT_UNIT.length;
          ta.selectionEnd = e + INDENT_UNIT.length * lines.length;
          state.inputs[q.id] = ta.value;
        }
        function outdentSelection(ta, q) {
          var v = ta.value,
            s = ta.selectionStart,
            e = ta.selectionEnd,
            b = lineBoundsOf(v, s, e),
            lines = v.slice(b.lineStart, b.lineEnd).split("\n"),
            removed = [],
            out = lines
              .map(function (l) {
                var m = l.match(/^( {1,4}|\t)/),
                  n = m ? m[0].length : 0;
                removed.push(n);
                return l.slice(n);
              })
              .join("\n");
          ta.value = v.slice(0, b.lineStart) + out + v.slice(b.lineEnd);
          var fr = removed[0] || 0,
            tr = removed.reduce(function (a, c) {
              return a + c;
            }, 0);
          ta.selectionStart = Math.max(b.lineStart, s - fr);
          ta.selectionEnd = Math.max(ta.selectionStart, e - tr);
          state.inputs[q.id] = ta.value;
        }
        function autoIndentNewline(ta, q) {
          var v = ta.value,
            pos = ta.selectionStart,
            ls = v.lastIndexOf("\n", pos - 1) + 1,
            cur = v.slice(ls, pos),
            im = cur.match(/^[ \t]*/),
            ind = im ? im[0] : "",
            lns = v.slice(0, pos).replace(/\s+$/, "").slice(-1),
            ex = lns === "{" ? INDENT_UNIT : "",
            ins = "\n" + ind + ex;
          ta.value = v.slice(0, pos) + ins + v.slice(pos);
          var np = pos + ins.length;
          ta.selectionStart = ta.selectionEnd = np;
          state.inputs[q.id] = ta.value;
        }
        function handleBracketKeydown(e, ta, q) {
          var key = e.key;
          if (e.ctrlKey || e.metaKey || e.altKey) return false;
          if (BRACKET_OPEN_CLOSE[key]) {
            var s = ta.selectionStart,
              en = ta.selectionEnd,
              v = ta.value,
              cl = BRACKET_OPEN_CLOSE[key];
            if (s !== en) {
              var sel = v.slice(s, en);
              ta.value = v.slice(0, s) + key + sel + cl + v.slice(en);
              ta.selectionStart = s + 1;
              ta.selectionEnd = en + 1;
            } else {
              ta.value = v.slice(0, s) + key + cl + v.slice(s);
              ta.selectionStart = ta.selectionEnd = s + 1;
            }
            state.inputs[q.id] = ta.value;
            e.preventDefault();
            return true;
          }
          if (QUOTE_CHARS[key]) {
            var s = ta.selectionStart,
              en = ta.selectionEnd,
              v = ta.value;
            if (s !== en) {
              var sel = v.slice(s, en);
              ta.value = v.slice(0, s) + key + sel + key + v.slice(en);
              ta.selectionStart = s + 1;
              ta.selectionEnd = en + 1;
              state.inputs[q.id] = ta.value;
              e.preventDefault();
              return true;
            }
            if (v[s] === key) {
              ta.selectionStart = ta.selectionEnd = s + 1;
              e.preventDefault();
              return true;
            }
            ta.value = v.slice(0, s) + key + key + v.slice(s);
            ta.selectionStart = ta.selectionEnd = s + 1;
            state.inputs[q.id] = ta.value;
            e.preventDefault();
            return true;
          }
          if (BRACKET_CLOSE_CHARS[key]) {
            var p = ta.selectionStart;
            if (ta.selectionStart === ta.selectionEnd && ta.value[p] === key) {
              ta.selectionStart = ta.selectionEnd = p + 1;
              e.preventDefault();
              return true;
            }
            return false;
          }
          if (key === "Backspace") {
            var ss = ta.selectionStart,
              se = ta.selectionEnd;
            if (ss === se && ss > 0) {
              var pc = ta.value[ss - 1],
                nc = ta.value[ss];
              if (
                (BRACKET_OPEN_CLOSE[pc] && BRACKET_OPEN_CLOSE[pc] === nc) ||
                (QUOTE_CHARS[pc] && pc === nc)
              ) {
                ta.value = ta.value.slice(0, ss - 1) + ta.value.slice(ss + 1);
                ta.selectionStart = ta.selectionEnd = ss - 1;
                state.inputs[q.id] = ta.value;
                e.preventDefault();
                return true;
              }
            }
            return false;
          }
          return false;
        }
        /* ============ undo 스택 ============ */
        var undoStack = {}; // { [qid]: [{value, ss, se}] }
        var undoPointer = {}; // { [qid]: number }
        var undoTimer = null;

        function pushUndo(q, ta) {
          var id = q.id;
          if (!undoStack[id]) {
            undoStack[id] = [];
            undoPointer[id] = -1;
          }
          var stack = undoStack[id];
          // 현재 포인터 이후 스택 제거
          stack.splice(undoPointer[id] + 1);
          stack.push({
            value: ta.value,
            ss: ta.selectionStart,
            se: ta.selectionEnd,
          });
          if (stack.length > 100) stack.shift();
          undoPointer[id] = stack.length - 1;
        }

        function doUndo(q, ta) {
          var id = q.id;
          if (!undoStack[id] || undoPointer[id] <= 0) return;
          undoPointer[id]--;
          var snap = undoStack[id][undoPointer[id]];
          ta.value = snap.value;
          ta.selectionStart = snap.ss;
          ta.selectionEnd = snap.se;
          state.inputs[id] = ta.value;
        }

        function scheduleUndo(q, ta) {
          clearTimeout(undoTimer);
          undoTimer = setTimeout(function () {
            pushUndo(q, ta);
          }, 300);
        }

        function handleEditorKeydown(e, ta, q) {
          if ((e.metaKey || e.ctrlKey) && e.key === "z" && !e.shiftKey) {
            e.preventDefault();
            doUndo(q, ta);
            return;
          }
          if (e.key === "Tab" && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault();
            pushUndo(q, ta);
            if (e.shiftKey) outdentSelection(ta, q);
            else indentSelection(ta, q);
            return;
          }
          if (e.key === "Enter" && !e.ctrlKey && !e.metaKey) {
            e.preventDefault();
            pushUndo(q, ta);
            autoIndentNewline(ta, q);
            return;
          }
          handleBracketKeydown(e, ta, q);
        }

            "</p>";
          html +=
            '<button class="btn btn-grade" data-action="exit-review">전체 문제로 돌아가기</button></div>';
          app.innerHTML = html;
          updateServerBadge();
        }

        function render() {
          var app = document.getElementById("app");
          if (!state.loaded) {
            app.innerHTML =
              '<div class="loading">진행 상황 불러오는 중...</div>';
            return;
          }
          var levelQs = activeQuestionList();
          if (
            (state.reviewMode || state.bookmarkMode) &&
            levelQs.length === 0
          ) {
            renderEmptySpecial();
            return;
          }
          if (state.index >= levelQs.length) state.index = 0;
          // auto-adjust qNavPage to keep current dot visible
          var Q_PAGE_SIZE = 6;
          if (!state.qNavPage) state.qNavPage = 0;
          if (state.index < state.qNavPage * Q_PAGE_SIZE ||
              state.index >= state.qNavPage * Q_PAGE_SIZE + Q_PAGE_SIZE) {
            state.qNavPage = Math.floor(state.index / Q_PAGE_SIZE);
          }
          var maxQPage = Math.max(0, Math.ceil(levelQs.length / Q_PAGE_SIZE) - 1);
          if (state.qNavPage > maxQPage) state.qNavPage = maxQPage;

          var q = levelQs[state.index],
            passed = totalPassed(),
            html = "";

          // Build dot-nav HTML (always 6 fixed slots)
          var qNavHtml = '<div class="q-nav">';
          qNavHtml += '<button class="q-nav-arrow" data-action="prev"' +
            (state.index === 0 ? ' disabled' : '') + '>&#8249;</button>';
          qNavHtml += '<div class="q-nav-dots">';
          var dotStart = state.qNavPage * Q_PAGE_SIZE;
          for (var di = dotStart; di < dotStart + Q_PAGE_SIZE; di++) {
            if (di < levelQs.length) {
              var dq = levelQs[di];
              var dst = state.progress[dq.id] && state.progress[dq.id].status;
              var dcls = 'dot' +
                (di === state.index ? ' current' : '') +
                (dst === 'pass' ? ' pass' : dst === 'fail' ? ' fail' : '') +
                (state.bookmarks[dq.id] ? ' bookmarked' : '');
              qNavHtml += '<div class="' + dcls + '" data-action="jump" data-index="' + di +
                '" title="' + esc(dq.id) + '">' + (di + 1) + '</div>';
            } else {
              qNavHtml += '<div class="dot dot-empty"></div>';
            }
          }
          qNavHtml += '</div>';
          qNavHtml += '<button class="q-nav-arrow" data-action="next"' +
            (state.index >= levelQs.length - 1 ? ' disabled' : '') + '>&#8250;</button>';
          qNavHtml += '</div>';

          // stats HTML (우상단)
          var statsHtml = '<div class="top-stats-box">';
          statsHtml += '<div class="progress-wrap"><div class="progress-label"><span>전체 진행</span><b>' +
            passed + ' / ' + QUESTIONS.length + '</b></div>';
          statsHtml += '<div class="progress-track"><div class="progress-fill" style="width:' +
            Math.round((passed / QUESTIONS.length) * 100) + '%"></div></div></div>';
          statsHtml += '<button class="reset-btn" data-action="reset-level">현재 장 초기화</button>';
          statsHtml += '</div>';

          html += '<div class="topbar">';
          // 상단 row: 좌=eyebrow+제목+서브, 우=전체진행+초기화
          html += '<div class="topbar-main"><div class="topbar-left">';
          html += '<div class="brand-eyebrow">$ run --suite ' + CHAPTER_DATA[currentCh].suite + '</div>';
          html += '<h1 class="brand-title">' + CHAPTER_DATA[currentCh].brandTitle + '</h1>';
          html += '<div class="brand-sub">코드를 입력하고 채점 버튼을 누르세요. <span id="server-badge" style="font-size:0.85em;">● regex 채점 (서버 꺼짐)</span></div>';
          html += '</div>' + statsHtml + '</div>';
          // 하단 row: 좌=kbd-hint(줄바꿈), 우=문항번호 dots
          html += '<div class="topbar-bottom">';
          html += '<div class="kbd-hint"><div><kbd>Ctrl/Cmd</kbd>+<kbd>Enter</kbd> 채점 · <kbd>←</kbd><kbd>→</kbd> 이전/다음 문제 · <kbd>R</kbd> 정답 보기</div><div><kbd>Esc</kbd> 입력창 빠져나오기 · <kbd>Enter</kbd> 입력창 포커스</div></div>';
          html += '<div class="top-qnav">' + qNavHtml + '</div>';
          html += '</div>';
          html += '</div>';

          /* --- level nav bar --- */
          var failCount = failedQuestions().length,
            bmCount = Object.keys(state.bookmarks).filter(function (k) {
              return state.bookmarks[k];
            }).length;
          var lnav = document.getElementById("level-nav"),
            lhtml = "";
          LEVELS.forEach(function (lv) {
            var p = levelPassed(lv.id),
              qs = questionsOfLevel(lv.id).length;
            var isActive =
              !state.reviewMode && !state.bookmarkMode && state.level === lv.id;
            var isDone = p === qs && qs > 0;
            lhtml +=
              '<button class="lv-btn' +
              (isDone ? " lv-done" : "") +
              (isActive ? " lv-active" : "") +
              '" data-action="select-level" data-level="' +
              lv.id +
              '">' +
              esc(lv.name) +
              ' <span style="font-family:var(--mono);font-size:10px;opacity:.7;">' +
              p +
              "/" +
              qs +
              "</span></button>";
          });
          lhtml += '<div class="lv-sep"></div>';
          lhtml +=
            '<button class="lv-btn lv-special' +
            (state.reviewMode ? " lv-on" : "") +
            '" data-action="toggle-review">📌 오답노트 <span style="font-family:var(--mono);font-size:10px;opacity:.7;">' +
            failCount +
            "</span></button>";
          lhtml +=
            '<button class="lv-btn lv-special' +
            (state.bookmarkMode ? " lv-on" : "") +
            '" data-action="toggle-bookmark-mode">🔖 즐겨찾기 <span style="font-family:var(--mono);font-size:10px;opacity:.7;">' +
            bmCount +
            "</span></button>";
          lhtml += '<button class="lv-reset-btn" data-action="reset-chapter">장 전체 초기화</button>';
          lnav.innerHTML = lhtml;
          (function () {
            var activeChBtn = document.querySelector('#chapter-nav .ch-btn[data-ch="' + currentCh + '"]');
            if (activeChBtn) activeChBtn.parentNode.insertBefore(lnav, activeChBtn.nextSibling);
            var alreadyOpen = lnav.style.display !== 'none' && !lnav.classList.contains('lnav-collapsed');
            if (chCollapsed) {
              lnav.style.display = 'none';
              lnav.classList.add('lnav-collapsed');
            } else if (alreadyOpen) {
              lnav.classList.remove('lnav-collapsed');
            } else {
              lnav.style.display = 'none';
              lnav.classList.add('lnav-no-transition', 'lnav-collapsed');
              lnav.getBoundingClientRect();
              lnav.classList.remove('lnav-no-transition');
              setLnavCollapsed(lnav, false);
            }
          })();

          html += '<div class="layout">';

          html += '<div class="content"><div class="card">';
          var eyebrow = state.reviewMode
            ? "📌 오답 노트 (복습 모드)"
            : state.bookmarkMode
              ? "🔖 즐겨찾기 모드"
              : esc(LEVELS[state.level].name);
          html +=
            '<div class="card-eyebrow">' +
            eyebrow +
            " · 문항 " +
            (state.index + 1) +
            " / " +
            levelQs.length +
            " · " +
            esc(q.id) +
            "</div>";
          html +=
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">';
          html +=
            '<h2 class="card-title" style="margin:0;">' +
            esc(q.title) +
            "</h2>";
          html +=
            '<button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;white-space:nowrap;" data-action="toggle-bookmark" data-qid="' +
            esc(q.id) +
            '">' +
            (state.bookmarks[q.id] ? "🔖 즐겨찾기 해제" : "☆ 즐겨찾기 추가") +
            "</button></div>";
          if (state.reviewMode || state.bookmarkMode)
            html +=
              '<button class="btn btn-ghost" style="align-self:flex-start;padding:5px 10px;font-size:12px;" data-action="exit-review">← 전체 문제로 돌아가기</button>';
          html +=
            '<div class="concept"><b>핵심 개념</b> — ' +
            esc(q.concept) +
            "</div>";
          html += '<div class="codebox">';
          q.before.forEach(function (l) {
            html += '<div class="cl muted">' + esc(l) + "</div>";
          });
          q.placeholder.forEach(function (l) {
            html += '<div class="cl muted">' + esc(l) + "</div>";
          });
          var savedInput =
            state.inputs[q.id] !== undefined
              ? state.inputs[q.id]
              : (state.progress[q.id] && state.progress[q.id].input) || "";
          html +=
            '<textarea class="blank" id="ans-input" rows="' +
            (q.rows || 5) +
            '" placeholder="여기에 코드를 입력하세요"></textarea>';
          q.after.forEach(function (l) {
            html += '<div class="cl muted">' + esc(l) + "</div>";
          });
          html += "</div>";
          html +=
            '<div class="expected">기대 출력: <code>' +
            esc(q.expected) +
            "</code></div>";
          var fb = state.progress[q.id],
            fbClass = "",
            fbText = "";
          var lastLog = state.log.filter(function (l) {
            return l.cmd === "check " + q.id;
          });
          var lastOutput = lastLog.length
            ? lastLog[lastLog.length - 1].output
            : null;
          if (fb && fb.status === "pass") {
            fbClass = "pass show";
            fbText = "✓ PASS — 정답입니다.";
          } else if (fb && fb.status === "fail") {
            fbClass = "fail show";
            fbText = "✗ FAIL — 문법을 다시 확인해보세요.";
          }
          var outputHtml = "";
          if (lastOutput !== null && lastOutput !== undefined) {
            outputHtml =
              '<div class="output-box">' +
              '<span class="output-label">출력</span>' +
              '<pre class="output-val">' +
              esc(lastOutput) +
              "</pre>" +
              "</div>";
          }
          html +=
            '<div class="actions"><button class="btn btn-grade" data-action="grade">채점</button>';
          html +=
            '<button class="btn btn-ghost" data-action="reveal">' +
            (state.revealed[q.id] ? "정답 숨기기" : "정답 보기") +
            "</button></div>";
          html +=
            '<div class="feedback ' +
            fbClass +
            '" id="fb-msg">' +
            fbText +
            "</div>";
          html += outputHtml;
          html +=
            '<div class="answer-box' +
            (state.revealed[q.id] ? " show" : "") +
            '">';
          html += '<div class="lbl">🔍 정답</div>';
          q.answer.forEach(function (l) {
            html += '<div class="al">' + esc(l) + "</div>";
          });
          if (q.note) html += '<div class="note">' + esc(q.note) + "</div>";
          html += "</div>";
          html += '<div class="nav-row">';
          html +=
            '<button class="btn btn-nav" data-action="prev" ' +
            (state.index === 0 ? "disabled" : "") +
            ">← 이전</button>";
          html +=
            '<span class="pos">' +
            (state.index + 1) +
            " / " +
            levelQs.length +
            "</span>";
          html +=
            '<button class="btn btn-nav" data-action="next" ' +
            (state.index === levelQs.length - 1 ? "disabled" : "") +
            ">다음 →</button>";
          html += "</div></div></div>";

          app.innerHTML = html;
          updateServerBadge();
          var ta = document.getElementById("ans-input");
          if (ta) {
            function autoResize() {
              ta.style.height = "auto";
              ta.style.height = ta.scrollHeight + "px";
            }
            ta.value = savedInput;
            autoResize();
            pushUndo(q, ta);
            ta.addEventListener("input", function () {
              state.inputs[q.id] = ta.value;
              scheduleUndo(q, ta);
              autoResize();
            });
            ta.addEventListener("keydown", function (e) {
              handleEditorKeydown(e, ta, q);
            });
          }
        }

        /* ============ 액션 ============ */
        function doSelectLevel(lv) {
          state.reviewMode = false;
          state.bookmarkMode = false;
          state.level = lv;
          state.index = 0;
          savePosition();
          render();
        }
        function doToggleReview() {
          state.reviewMode = !state.reviewMode;
          if (state.reviewMode) state.bookmarkMode = false;
          state.index = 0;
          render();
        }
        function doToggleBookmarkMode() {
          state.bookmarkMode = !state.bookmarkMode;
          if (state.bookmarkMode) state.reviewMode = false;
          state.index = 0;
          render();
        }
        function doExitSpecialMode() {
          state.reviewMode = false;
          state.bookmarkMode = false;
          state.index = 0;
          render();
        }
        function doJump(i) {
          state.index = i;
          state.qNavPage = Math.floor(i / 6);
          savePosition();
          render();
        }
        function doQNavPrev() {
          if (state.qNavPage > 0) { state.qNavPage--; render(); }
        }
        function doQNavNext() {
          var lq = activeQuestionList();
          var maxPage = Math.max(0, Math.ceil(lq.length / 6) - 1);
          if (state.qNavPage < maxPage) { state.qNavPage++; render(); }
        }
        function doPrev() {
          if (state.index > 0) {
            state.index--;
            savePosition();
            render();
          }
        }
        function doNext() {
          var lq = activeQuestionList();
          if (state.index < lq.length - 1) {
            state.index++;
            savePosition();
            render();
          }
        }
        function doReveal() {
          var lq = activeQuestionList(),
            q = lq[state.index];
          if (!q) return;
          state.revealed[q.id] = !state.revealed[q.id];
          render();
        }
        function doToggleBookmark(qid) {
          if (!qid) return;
          if (state.bookmarks[qid]) delete state.bookmarks[qid];
          else state.bookmarks[qid] = true;
          saveBookmarks();
          render();
        }
        async function doGrade() {
          var lq = activeQuestionList(),
            q = lq[state.index];
          if (!q) return;
          var ta = document.getElementById("ans-input"),
            val = ta ? ta.value : "";
          var gradeBtn = document.querySelector('[data-action="grade"]');
          if (gradeBtn) {
            gradeBtn.disabled = true;
            gradeBtn.textContent = "채점 중...";
          }
          var executionOutput = null;
          var pass;
          if (serverAvailable) {
            var result = await gradeByExecution(q, val);
            if (result !== null) {
              pass = result.pass;
              executionOutput = result.output;
            } else {
              pass = gradeQuestion(q, val);
            }
          } else {
            pass = gradeQuestion(q, val);
          }
          if (gradeBtn) {
            gradeBtn.disabled = false;
            gradeBtn.textContent = "채점";
          }
          state.progress[q.id] = { status: pass ? "pass" : "fail", input: val };
          pushLog(q.id, pass, executionOutput);
          saveProgress();
          render();
        }
        function doResetLevel() {
          var lvName = LEVELS[state.level] ? LEVELS[state.level].name : '현재 장';
          if (!window.confirm('"' + lvName + '" 문제를 모두 초기화할까요? 되돌릴 수 없습니다.')) return;
          questionsOfLevel(state.level).forEach(function (q) {
            delete state.progress[q.id];
            delete state.inputs[q.id];
            delete state.revealed[q.id];
          });
          state.index = 0;
          state.reviewMode = false;
          saveProgress();
          render();
        }
        function doResetChapter() {
          var chName = CHAPTER_DATA[currentCh] ? CHAPTER_DATA[currentCh].brandTitle : '현재 챕터';
          if (!window.confirm('"' + chName + '" 전체 장을 초기화할까요? 되돌릴 수 없습니다.')) return;
          state.progress = {};
          state.inputs = {};
          state.revealed = {};
          state.log = [];
          state.index = 0;
          state.reviewMode = false;
          saveProgress();
          render();
        }
        function doResetAll() {
          if (!window.confirm('모든 챕터의 진행 상황을 초기화할까요? 되돌릴 수 없습니다.')) return;
          Object.values(CHAPTER_DATA).forEach(function (chData) {
            if (chData.storageKey) store.set(chData.storageKey, '{}');
            if (chData.bookmarkKey) store.set(chData.bookmarkKey, '{}');
          });
          state.progress = {};
          state.inputs = {};
          state.revealed = {};
          state.log = [];
          state.index = 0;
          state.reviewMode = false;
          saveProgress();
          render();
        }
        function focusAnswerInput() {
          var ta = document.getElementById("ans-input");
          if (ta) ta.focus();
        }

        /* ============ 이벤트 ============ */
        function handleAction(el) {
          var action = el.getAttribute("data-action");
          if (action === "select-level")
            doSelectLevel(parseInt(el.getAttribute("data-level"), 10));
          else if (action === "toggle-review") doToggleReview();
          else if (action === "toggle-bookmark-mode") doToggleBookmarkMode();
          else if (action === "exit-review") doExitSpecialMode();
          else if (action === "jump")
            doJump(parseInt(el.getAttribute("data-index"), 10));
          else if (action === "prev") doPrev();
          else if (action === "next") doNext();
          else if (action === "qnav-prev") doQNavPrev();
          else if (action === "qnav-next") doQNavNext();
          else if (action === "reveal") doReveal();
          else if (action === "toggle-bookmark")
            doToggleBookmark(el.getAttribute("data-qid"));
          else if (action === "grade") doGrade();
          else if (action === "reset-level") doResetLevel();
          else if (action === "reset-chapter") doResetChapter();
          else if (action === "go-chapter") {
            var ch = parseInt(el.getAttribute("data-ch"), 10);
            isOverview = false;
            switchChapter(ch);
          }
        }
        document
          .getElementById("level-nav")
          .addEventListener("click", function (e) {
            var el = e.target.closest("[data-action]");
            if (!el) return;
            handleAction(el);
          });
        document.getElementById("app").addEventListener("click", function (e) {
          var el = e.target.closest("[data-action]");
          if (!el) return;
          handleAction(el);
        });

        document.addEventListener("keydown", function (e) {
          var ta = document.getElementById("ans-input"),
            taf = document.activeElement === ta;
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            doGrade();
            return;
          }
          if (taf) {
            if (e.key === "Escape") {
              e.preventDefault();
              ta.blur();
            }
            return;
          }
          if (e.key === "Enter") {
            e.preventDefault();
            focusAnswerInput();
          } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            doPrev();
          } else if (e.key === "ArrowRight") {
            e.preventDefault();
            doNext();
          } else if (e.key === "r" || e.key === "R") {
            e.preventDefault();
            doReveal();
          }
        });

        /* ============ 사이드바 핀 ============ */
        (function () {
          var sidebar = document.getElementById('sidebar');
          var pinBtn = document.getElementById('sidebar-pin');
          function applyPinned(pinned) {
            sidebar.classList.toggle('pinned', pinned);
            pinBtn.title = pinned ? '사이드바 고정 해제' : '사이드바 고정';
          }
          if (localStorage.getItem('sidebar_pinned') === '1') applyPinned(true);
          pinBtn.addEventListener('click', function () {
            var next = !sidebar.classList.contains('pinned');
            applyPinned(next);
            localStorage.setItem('sidebar_pinned', next ? '1' : '0');
          });
        })();

        /* ============ 시작 ============ */
        loadPosition();
        render();
        loadProgress().then(function () { render(); updateChDoneBadges(); });
        checkServer();
      })();
    </script>
  </body>
</html>
